              </button>
              <button onClick={() => { setShowLateForm(f => !f); setShowGroupForm(false); }} style={{ flex: 1, padding: "9px 6px", borderRadius: 8, border: `1px solid ${showLateForm ? "rgba(239,68,68,0.4)" : "rgba(251,191,36,0.35)"}`, background: showLateForm ? "rgba(239,68,68,0.1)" : "rgba(251,191,36,0.1)", color: showLateForm ? "#f87171" : "#fbbf24", cursor: "pointer", fontWeight: 600, fontSize: 11 }}>
                {showLateForm ? "✕ Cancel" : `⏰ Late (${N(LATE_FEE)})`}
              </button>
            </div>

            {/* Group payment */}
            {showGroupForm && (
              <div style={{ background: "rgba(96,165,250,0.06)", border: "1px solid rgba(96,165,250,0.2)", borderRadius: 12, padding: 14, marginBottom: 14 }}>
                <Lbl c="#60a5fa">Group Payment</Lbl>
                <div style={{ marginBottom: 8, marginTop: 6 }}>
                  <Lbl>Who is paying?</Lbl>
                  <select value={groupPayer} onChange={e => setGroupPayer(e.target.value)} style={sS}>
                    <option value="" style={{ background: "#1a2235" }}>Select payer</option>
                    {players.map(p => <option key={p.id} value={p.id} style={{ background: "#1a2235" }}>{p.name}</option>)}
                  </select>
                </div>
                <div style={{ marginBottom: 8 }}>
                  <Lbl>Covers which players?</Lbl>
                  {players.map(p => (
                    <label key={p.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "7px 10px", borderRadius: 7, marginBottom: 4, background: groupCovered.includes(String(p.id)) ? "rgba(96,165,250,0.12)" : "rgba(255,255,255,0.03)", border: `1px solid ${groupCovered.includes(String(p.id)) ? "rgba(96,165,250,0.3)" : "rgba(255,255,255,0.06)"}`, cursor: "pointer" }}>
                      <input type="checkbox" checked={groupCovered.includes(String(p.id))} onChange={e => setGroupCovered(gc => e.target.checked ? [...gc, String(p.id)] : gc.filter(x => x !== String(p.id)))} style={{ accentColor: "#60a5fa" }} />
                      <span style={{ fontSize: 13 }}>{p.name}</span>
                    </label>
                  ))}
                </div>
                <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
                  {["cash", "transfer"].map(m => (
                    <button key={m} onClick={() => setGroupMethod(m)} style={{ flex: 1, padding: "8px", borderRadius: 7, border: `1px solid ${groupMethod === m ? "rgba(96,165,250,0.4)" : "rgba(255,255,255,0.07)"}`, background: groupMethod === m ? "rgba(96,165,250,0.18)" : "rgba(255,255,255,0.04)", color: groupMethod === m ? "#60a5fa" : "#6b7280", cursor: "pointer", fontWeight: 600, fontSize: 12 }}>{m === "cash" ? "💵 Cash" : "🏦 Transfer"}</button>
                  ))}
                </div>
                {groupCovered.length > 0 && <div style={{ fontSize: 12, color: "#6b7280", marginBottom: 8 }}>Total: {N(groupCovered.length * sessionFee)} for {groupCovered.length} players</div>}
                <button onClick={recordGroupPayment} disabled={!groupCovered.length || !groupPayer} style={{ width: "100%", padding: "10px", borderRadius: 8, border: "none", background: groupCovered.length && groupPayer ? "linear-gradient(135deg,#1d4ed8,#60a5fa)" : "rgba(255,255,255,0.05)", color: groupCovered.length && groupPayer ? "#fff" : "#4b5563", fontWeight: 800, cursor: groupCovered.length && groupPayer ? "pointer" : "not-allowed" }}>✓ Record Group Payment</button>
              </div>
            )}

            {/* Late fee form */}
            {showLateForm && (
              <div style={{ background: "rgba(251,191,36,0.06)", border: "1px solid rgba(251,191,36,0.2)", borderRadius: 12, padding: 14, marginBottom: 14 }}>

                <div style={{ marginBottom: 8, marginTop: 6 }}>
                  <Lbl>Player</Lbl>
                  <select value={latePlayer} onChange={e => setLatePlayer(e.target.value)} style={sS}>
                    <option value="" style={{ background: "#1a2235" }}>Who was late?</option>
                    {players.map(p => <option key={p.id} value={p.id} style={{ background: "#1a2235" }}>{p.name}</option>)}
                  </select>
                </div>
                <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>

              const reg = isReg(p.name);
              return (
                <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "11px 14px", borderRadius: 10, marginBottom: 7, background: paid ? "rgba(74,222,128,0.07)" : "rgba(255,255,255,0.03)", border: `1px solid ${paid ? "rgba(74,222,128,0.2)" : "rgba(255,255,255,0.06)"}` }}>
                  <div style={{ width: 34, height: 34, borderRadius: "50%", background: reg ? "linear-gradient(135deg,#6d28d9,#a78bfa)" : "rgba(255,255,255,0.08)", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 14, color: reg ? "#fff" : "#6b7280", flexShrink: 0 }}>

                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 600, fontSize: 13, display: "flex", alignItems: "center", gap: 5 }}>
                      {p.name}
                      {reg && <span style={{ fontSize: 8, background: "rgba(167,139,250,0.2)", color: "#a78bfa", borderRadius: 4, padding: "1px 4px" }}>REG</span>}
                    </div>
                    <div style={{ fontSize: 11, color: paid ? "#4ade80" : "#f87171", fontWeight: 600 }}>{paid ? `✓ ${N(sessionFee)} paid` : `Owes ${N(sessionFee)}`}</div>
                  </div>
                  {!paid && (
                    <div style={{ display: "flex", gap: 5 }}>
                      <button onClick={() => recordSessionPayment(p, "cash")} style={{ padding: "6px 9px", borderRadius: 7, border: "1px solid rgba(74,222,128,0.3)", background: "rgba(74,222,128,0.12)", color: "#4ade80", cursor: "pointer", fontSize: 11, fontWeight: 600 }}>💵 Cash</button>
                      <button onClick={() => setPayModal(p)} style={{ padding: "6px 9px", borderRadius: 7, border: "1px solid rgba(96,165,250,0.3)", background: "rgba(96,165,250,0.1)", color: "#60a5fa", cursor: "pointer", fontSize: 11, fontWeight: 600 }}>🏦</button>
                    </div>
                  )}
                </div>
              );
            })}

            {/* Transaction log */}
            {txns.length > 0 && (
              <div style={{ marginTop: 20 }}>
                <SecHead color="#6b7280">Transaction Log</SecHead>
                {[...txns].reverse().map(t => (
                  <div key={t.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "9px 12px", background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 9, marginBottom: 6 }}>
                    <span style={{ fontSize: 16 }}>{t.method === "cash" ? "💵" : "🏦"}</span>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 12, fontWeight: 600 }}>{t.note}</div>
                      <div style={{ fontSize: 10, color: "#4b5563" }}>{t.date} · {t.method}</div>
                    </div>
                    <span style={{ fontSize: 13, fontWeight: 700, color: "#4ade80" }}>+{N(t.amount)}</span>
                    <button onClick={() => setTxns(tx => tx.filter(x => x.id !== t.id))} style={{ background: "rgba(239,68,68,0.1)", border: "none", color: "#ef4444", borderRadius: 5, padding: "3px 7px", cursor: "pointer", fontSize: 10 }}>✕</button>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* ══════════════════════ FINANCE ══════════════════════ */}
        {tab === "finance" && (
          <div>
            {/* Sub nav */}
            <div style={{ display: "flex", gap: 6, marginBottom: 16 }}>
              {[["overview", "📊 Overview"], ["daily", "📅 Daily"], ["expenses", "💸 Expenses"]].map(([id, label]) => (
                <button key={id} onClick={() => setFinView(id)} style={{ flex: 1, padding: "9px 4px", borderRadius: 8, border: `1px solid ${finView === id ? "rgba(96,165,250,0.4)" : "rgba(255,255,255,0.08)"}`, background: finView === id ? "rgba(96,165,250,0.15)" : "rgba(255,255,255,0.03)", color: finView === id ? "#60a5fa" : "#6b7280", cursor: "pointer", fontWeight: 600, fontSize: 11 }}>{label}</button>
              ))}
            </div>

            {/* OVERVIEW */}
            {finView === "overview" && (
              <div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 16 }}>
                  {[
                    { e: "💰", l: "Total Income",    v: N(totalIncome),   c: "#4ade80" },
                    { e: "💸", l: "Total Expenses",  v: N(totalExpenses), c: "#f87171" },
                    { e: "📈", l: "Net Profit",       v: N(netProfit),     c: netProfit >= 0 ? "#4ade80" : "#f87171" },
                    { e: "💵", l: "Cash Received",   v: N(txns.filter(t => t.method === "cash").reduce((s, t) => s + t.amount, 0)), c: "#fbbf24" },
                    { e: "🏦", l: "Bank Transfers",  v: N(txns.filter(t => t.method === "transfer").reduce((s, t) => s + t.amount, 0)), c: "#60a5fa" },
                    { e: "🃏", l: "Card Fines",      v: N(txns.filter(t => t.type === "card_fine").reduce((s, t) => s + t.amount, 0)), c: "#fbbf24" },
                    { e: "⏰", l: "Late Fees",       v: N(txns.filter(t => t.type === "late").reduce((s, t) => s + t.amount, 0)), c: "#f87171" },
                    { e: "👥", l: "Training Levies", v: N(txns.filter(t => !["card_fine","late"].includes(t.type)).reduce((s, t) => s + t.amount, 0)), c: "#a78bfa" },
                  ].map(c => (
                    <div key={c.l} style={{ background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 12, padding: "13px 12px" }}>

                      <div style={{ fontSize: 18, fontWeight: 800, color: c.c }}>{c.v}</div>
                      <div style={{ fontSize: 10, color: "#6b7280", marginTop: 2 }}>{c.l}</div>
                    </div>
                  ))}
                </div>
                {totalIncome > 0 && (
                  <div style={{ background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 12, padding: 14 }}>
                    <div style={{ fontSize: 11, color: "#6b7280", fontWeight: 600, marginBottom: 8 }}>INCOME vs EXPENSES</div>
                    <div style={{ height: 10, background: "rgba(255,255,255,0.07)", borderRadius: 5, overflow: "hidden", marginBottom: 6 }}>
                      <div style={{ height: "100%", background: "linear-gradient(90deg,#16a34a,#4ade80)", borderRadius: 5, width: `${Math.min(100, (totalIncome / (totalIncome + totalExpenses || 1)) * 100)}%` }} />
                    </div>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11 }}>
                      <span style={{ color: "#4ade80" }}>Income {N(totalIncome)}</span>
                      <span style={{ color: "#f87171" }}>Expenses {N(totalExpenses)}</span>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* DAILY */}
            {finView === "daily" && (
              <div>
                <div style={{ fontSize: 12, color: "#6b7280", marginBottom: 12 }}>Every transaction grouped by date</div>
                {allDates.length === 0 && <div style={{ textAlign: "center", color: "#374151", padding: "30px 0" }}>No transactions yet</div>}
                {allDates.map(date => {
                  const dayTxns = txns.filter(t => (t.date || sessionDate) === date);
                  const dayIncome = dayTxns.reduce((s, t) => s + t.amount, 0);
                  const dayExp = expenses.filter(e => e.date === date);
                  const dayExpTotal = dayExp.reduce((s, e) => s + e.amount, 0);
                  const dayNet = dayIncome - dayExpTotal;
                  if (dayTxns.length === 0 && dayExp.length === 0) return null;
                  return (
                    <div key={date} style={{ background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 12, padding: 14, marginBottom: 12 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                        <div style={{ fontWeight: 700, fontSize: 14 }}>{new Date(date + "T12:00:00").toLocaleDateString("en-GB", { weekday: "short", day: "numeric", month: "short", year: "numeric" })}</div>
                        <div style={{ display: "flex", gap: 8 }}>
                          {dayIncome > 0 && <span style={{ fontSize: 11, color: "#4ade80", fontWeight: 700 }}>+{N(dayIncome)}</span>}
                          {dayExpTotal > 0 && <span style={{ fontSize: 11, color: "#f87171", fontWeight: 700 }}>-{N(dayExpTotal)}</span>}
                          <span style={{ fontSize: 11, color: dayNet >= 0 ? "#60a5fa" : "#f87171", fontWeight: 700 }}>= {N(dayNet)}</span>

                      </div>
                      {/* Income items */}
                      {dayTxns.map(t => (
                        <div key={t.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 10px", borderRadius: 7, background: "rgba(74,222,128,0.05)", border: "1px solid rgba(74,222,128,0.1)", marginBottom: 4 }}>
                          <div>
                            <span style={{ fontSize: 12, color: "#d1fae5" }}>{t.note}</span>
                            <span style={{ fontSize: 10, color: "#4b5563", marginLeft: 6 }}>{t.method === "cash" ? "💵" : "🏦"} {t.category || ""}</span>
                          </div>
                          <span style={{ fontSize: 12, color: "#4ade80", fontWeight: 700 }}>+{N(t.amount)}</span>
                        </div>
                      ))}
                      {/* Expense items */}
                      {dayExp.map(e => (
                        <div key={e.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 10px", borderRadius: 7, background: "rgba(239,68,68,0.05)", border: "1px solid rgba(239,68,68,0.12)", marginBottom: 4 }}>
                          <span style={{ fontSize: 12, color: "#fca5a5" }}>{e.desc} <span style={{ color: "#4b5563", fontSize: 10 }}>({e.category})</span></span>
                          <span style={{ fontSize: 12, color: "#f87171", fontWeight: 700 }}>-{N(e.amount)}</span>
                        </div>
                      ))}
                    </div>
                  );
                })}
              </div>
            )}

            {/* EXPENSES */}

              <div>

                    {showExForm ? "✕ Cancel" : "+ Add Expense"}

                {showExForm && (
                  <div style={{ background: "rgba(239,68,68,0.06)", border: "1px solid rgba(239,68,68,0.2)", borderRadius: 12, padding: 14, marginBottom: 14 }}>

                      <Lbl>Description *</Lbl>
                      <input value={exDesc} onChange={e => setExDesc(e.target.value)} placeholder="e.g. Pitch hire" style={iS} />
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 8 }}>
                      <div><Lbl>Amount (₦) *</Lbl><input type="number" value={exAmt} onChange={e => setExAmt(e.target.value)} placeholder="0" style={iS} /></div>
                      <div><Lbl>Date</Lbl><input type="date" value={exDate} onChange={e => setExDate(e.target.value)} style={iS} /></div>
                    </div>
                    <div style={{ marginBottom: 12 }}>
                      <Lbl>Category</Lbl>
                      <select value={exCat} onChange={e => setExCat(e.target.value)} style={sS}>

                      </select>
                    </div>
                    <button onClick={addExpense} disabled={!exDesc.trim() || !exAmt} style={{ width: "100%", padding: "10px", borderRadius: 8, border: "none", background: exDesc.trim() && exAmt ? "linear-gradient(135deg,#7f1d1d,#ef4444)" : "rgba(255,255,255,0.05)", color: exDesc.trim() && exAmt ? "#fff" : "#4b5563", fontWeight: 800, cursor: exDesc.trim() && exAmt ? "pointer" : "not-allowed" }}>+ Record Expense</button>
                  </div>
                )}
                {expenses.length === 0 && <div style={{ textAlign: "center", color: "#374151", padding: "30px 0" }}>No expenses recorded</div>}
                {[...expenses].reverse().map(e => (
                  <div key={e.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "11px 14px", background: "rgba(239,68,68,0.06)", border: "1px solid rgba(239,68,68,0.15)", borderRadius: 10, marginBottom: 8 }}>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 13, fontWeight: 600 }}>{e.desc}</div>
                      <div style={{ fontSize: 10, color: "#6b7280" }}>{e.category} · {new Date(e.date + "T12:00:00").toLocaleDateString("en-GB", { day: "numeric", month: "short" })}</div>
                    </div>
                    <span style={{ fontSize: 14, fontWeight: 800, color: "#f87171" }}>-{N(e.amount)}</span>
                    <button onClick={() => setExpenses(ex => ex.filter(x => x.id !== e.id))} style={{ background: "rgba(239,68,68,0.1)", border: "none", color: "#ef4444", borderRadius: 6, padding: "4px 8px", cursor: "pointer", fontSize: 11 }}>✕</button>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* ══════════════════════ NOTES ══════════════════════ */}
        {tab === "notes" && (
          <div>
            <div style={{ marginBottom: 16 }}>
              <Lbl>Session Notes</Lbl>
              <textarea value={sessionNote} onChange={e => setSessionNote(e.target.value)} placeholder="Tactics, observations, areas to improve..." rows={4} style={{ ...iS, marginTop: 6, resize: "vertical", lineHeight: 1.6 }} />
            </div>
            <Lbl>Player Notes</Lbl>
            {players.length === 0 && <div style={{ textAlign: "center", color: "#374151", padding: "20px 0" }}>Add players first</div>}
            {players.map(p => (
              <div key={p.id} style={{ marginBottom: 10 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 5 }}>
                  <div style={{ width: 26, height: 26, borderRadius: "50%", background: isReg(p.name) ? "linear-gradient(135deg,#6d28d9,#a78bfa)" : "rgba(255,255,255,0.08)", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 12, color: "#fff" }}>
                    {p.name.charAt(0).toUpperCase()}
                  </div>
                  <span style={{ fontSize: 13, fontWeight: 600 }}>{p.name}</span>
                  {isReg(p.name) && <span style={{ fontSize: 8, background: "rgba(167,139,250,0.2)", color: "#a78bfa", borderRadius: 4, padding: "1px 4px", fontWeight: 700 }}>REG</span>}
                </div>
                <input value={pNotes[p.id] || ""} onChange={e => setPNotes(n => ({ ...n, [p.id]: e.target.value }))} placeholder={`Notes for ${p.name.split(" ")[0]}...`} style={iS} />
              </div>
            ))}
          </div>
        )}

        {/* ══════════════════════ DONATIONS ══════════════════════ */}
        {tab === "donations" && (() => {
          const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

          const addDonor = () => {
            if (!donorName.trim()) return;
            setDonors(d => [...d, { id: Date.now(), name: donorName.trim() }]);
            setDonorName(""); setShowDonorForm(false);
          };

          const startEdit = (donorId, month) => {
            const cur = (donations[donorId] || {})[month] || "";
            setEditingCell({ donorId, month });
            setCellValue(String(cur));
          };

          const commitEdit = () => {
            if (!editingCell) return;
            const { donorId, month } = editingCell;
            const amt = Number(cellValue) || 0;
            setDonations(d => ({
              ...d,
              [donorId]: { ...(d[donorId] || {}), [month]: amt }
            }));
            setEditingCell(null); setCellValue("");
          };

          // Row totals
          const rowTotal = (donorId) =>
            months.reduce((s, m) => s + ((donations[donorId] || {})[m] || 0), 0);

          // Column totals
          const colTotal = (month) =>
            donors.reduce((s, d) => s + ((donations[d.id] || {})[month] || 0), 0);

          // Grand total
          const grandTotal = donors.reduce((s, d) => s + rowTotal(d.id), 0);

          // Year total income from donations
          const donationIncome = grandTotal;

          return (
            <div>
              {/* Header stats */}
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 14 }}>
                <div style={{ background: "rgba(251,191,36,0.08)", border: "1px solid rgba(251,191,36,0.2)", borderRadius: 12, padding: "13px 12px" }}>
                  <div style={{ fontSize: 11, color: "#fbbf24", fontWeight: 700, textTransform: "uppercase", marginBottom: 4 }}>Pioneers</div>
                  <div style={{ fontSize: 24, fontWeight: 800, color: "#fbbf24" }}>{donors.length}</div>
                </div>
                <div style={{ background: "rgba(74,222,128,0.08)", border: "1px solid rgba(74,222,128,0.2)", borderRadius: 12, padding: "13px 12px" }}>
                  <div style={{ fontSize: 11, color: "#4ade80", fontWeight: 700, textTransform: "uppercase", marginBottom: 4 }}>{donYear} Total</div>
                  <div style={{ fontSize: 22, fontWeight: 800, color: "#4ade80" }}>₦{donationIncome.toLocaleString()}</div>
                </div>
              </div>

              {/* Year selector + Add donor */}
              <div style={{ display: "flex", gap: 8, marginBottom: 14, alignItems: "center" }}>
                <select value={donYear} onChange={e => setDonYear(Number(e.target.value))}
                  style={{ ...sS, flex: 1 }}>
                  {[2024,2025,2026,2027,2028].map(y => <option key={y} value={y} style={{ background: "#1a2235" }}>{y}</option>)}
                </select>
                <button onClick={() => setShowDonorForm(f => !f)} style={{ flexShrink: 0, fontSize: 11, padding: "9px 14px", borderRadius: 8, border: `1px solid ${showDonorForm ? "rgba(239,68,68,0.4)" : "rgba(251,191,36,0.4)"}`, background: showDonorForm ? "rgba(239,68,68,0.1)" : "rgba(251,191,36,0.1)", color: showDonorForm ? "#f87171" : "#fbbf24", cursor: "pointer", fontWeight: 700 }}>
                  {showDonorForm ? "✕ Cancel" : "+ Add Pioneer"}
                </button>
              </div>

              {/* Add donor form */}
              {showDonorForm && (
                <div style={{ background: "rgba(251,191,36,0.06)", border: "1px solid rgba(251,191,36,0.2)", borderRadius: 12, padding: 14, marginBottom: 14 }}>
                  <div style={{ fontSize: 11, color: "#fbbf24", fontWeight: 700, textTransform: "uppercase", marginBottom: 8 }}>New Pioneer Member</div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <input value={donorName} onChange={e => setDonorName(e.target.value)} placeholder="Full name" style={{ ...iS, flex: 1 }} onKeyDown={e => e.key === "Enter" && addDonor()} />
                    <button onClick={addDonor} disabled={!donorName.trim()} style={{ padding: "9px 16px", borderRadius: 8, border: "none", background: donorName.trim() ? "linear-gradient(135deg,#92400e,#fbbf24)" : "rgba(255,255,255,0.05)", color: donorName.trim() ? "#0a0e1a" : "#4b5563", fontWeight: 800, cursor: donorName.trim() ? "pointer" : "not-allowed" }}>Add</button>
                  </div>
                </div>
              )}

              {donors.length === 0 && (
                <div style={{ textAlign: "center", color: "#374151", padding: "40px 0", fontSize: 13 }}>
                  No pioneer members yet — tap "+ Add Pioneer"
                </div>
              )}

              {/* Scrollable table */}
              {donors.length > 0 && (
                <div style={{ overflowX: "auto", overflowY: "auto", maxHeight: "60vh", borderRadius: 12, border: "1px solid rgba(255,255,255,0.08)", WebkitOverflowScrolling: "touch" }}>
                  <table style={{ borderCollapse: "collapse", minWidth: 900, width: "100%" }}>
                    {/* Table head */}
                    <thead>
                      <tr style={{ background: "rgba(251,191,36,0.1)" }}>
                        <th style={{ padding: "10px 12px", textAlign: "left", fontSize: 11, color: "#fbbf24", fontWeight: 700, textTransform: "uppercase", borderBottom: "1px solid rgba(255,255,255,0.08)", position: "sticky", left: 0, background: "#111827", minWidth: 120 }}>Pioneer</th>
                        {months.map(m => (
                          <th key={m} style={{ padding: "10px 8px", fontSize: 10, color: "#fbbf24", fontWeight: 700, textTransform: "uppercase", borderBottom: "1px solid rgba(255,255,255,0.08)", textAlign: "center", minWidth: 64 }}>{m}</th>
                        ))}
                        <th style={{ padding: "10px 10px", fontSize: 10, color: "#4ade80", fontWeight: 700, textTransform: "uppercase", borderBottom: "1px solid rgba(255,255,255,0.08)", textAlign: "center", minWidth: 80, background: "rgba(74,222,128,0.06)" }}>Total</th>
                        <th style={{ padding: "10px 6px", fontSize: 10, color: "#f87171", fontWeight: 700, borderBottom: "1px solid rgba(255,255,255,0.08)", textAlign: "center", minWidth: 36 }}></th>
                      </tr>
                    </thead>
                    <tbody>
                      {donors.map((donor, di) => (
                        <tr key={donor.id} style={{ background: di % 2 === 0 ? "transparent" : "rgba(255,255,255,0.02)" }}>
                          {/* Name cell */}
                          <td style={{ padding: "9px 12px", fontSize: 13, fontWeight: 600, color: "#e8eaf0", borderBottom: "1px solid rgba(255,255,255,0.05)", position: "sticky", left: 0, background: di % 2 === 0 ? "#0a0e1a" : "#0d1220", whiteSpace: "nowrap" }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
                              <div style={{ width: 26, height: 26, borderRadius: "50%", background: "linear-gradient(135deg,#92400e,#fbbf24)", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 11, color: "#0a0e1a", flexShrink: 0 }}>
                                {donor.name.charAt(0).toUpperCase()}
                              </div>
                              {donor.name}
                            </div>
                          </td>
                          {/* Month cells */}
                          {months.map(month => {
                            const val = (donations[donor.id] || {})[month] || 0;
                            const isEditing = editingCell && editingCell.donorId === donor.id && editingCell.month === month;
                            return (
                              <td key={month} style={{ padding: "4px", textAlign: "center", borderBottom: "1px solid rgba(255,255,255,0.05)" }}>
                                {isEditing ? (
                                  <input
                                    autoFocus
                                    type="number"
                                    value={cellValue}
                                    onChange={e => setCellValue(e.target.value)}
                                    onBlur={commitEdit}
                                    onKeyDown={e => { if (e.key === "Enter") commitEdit(); if (e.key === "Escape") { setEditingCell(null); setCellValue(""); } }}
                                    style={{ width: 58, background: "rgba(251,191,36,0.15)", border: "1px solid rgba(251,191,36,0.5)", borderRadius: 6, padding: "4px 6px", color: "#fbbf24", fontSize: 12, textAlign: "center", outline: "none" }}
                                  />
                                ) : (
                                  <div onClick={() => startEdit(donor.id, month)} style={{ cursor: "pointer", padding: "5px 4px", borderRadius: 6, minHeight: 28, display: "flex", alignItems: "center", justifyContent: "center", background: val > 0 ? "rgba(74,222,128,0.1)" : "rgba(255,255,255,0.03)", border: `1px solid ${val > 0 ? "rgba(74,222,128,0.2)" : "rgba(255,255,255,0.06)"}`, fontSize: 11, fontWeight: val > 0 ? 700 : 400, color: val > 0 ? "#4ade80" : "#374151" }}>
                                    {val > 0 ? `₦${val.toLocaleString()}` : "—"}
                                  </div>
                                )}
                              </td>
                            );
                          })}
                          {/* Row total */}
                          <td style={{ padding: "9px 10px", textAlign: "center", borderBottom: "1px solid rgba(255,255,255,0.05)", background: "rgba(74,222,128,0.05)" }}>
                            <span style={{ fontSize: 12, fontWeight: 800, color: "#4ade80" }}>₦{rowTotal(donor.id).toLocaleString()}</span>
                          </td>
                          {/* Remove */}
                          <td style={{ padding: "4px 6px", textAlign: "center", borderBottom: "1px solid rgba(255,255,255,0.05)" }}>
                            <button onClick={() => { setDonors(d => d.filter(x => x.id !== donor.id)); setDonations(d => { const n = {...d}; delete n[donor.id]; return n; }); }} style={{ width: 24, height: 24, borderRadius: 5, border: "none", background: "rgba(239,68,68,0.12)", color: "#ef4444", cursor: "pointer", fontSize: 11 }}>✕</button>
                          </td>
                        </tr>
                      ))}

                      {/* Column totals row */}
                      <tr style={{ background: "rgba(74,222,128,0.06)", borderTop: "2px solid rgba(74,222,128,0.2)" }}>
                        <td style={{ padding: "10px 12px", fontSize: 11, fontWeight: 800, color: "#4ade80", textTransform: "uppercase", position: "sticky", left: 0, background: "rgba(74,222,128,0.08)" }}>Monthly Total</td>
                        {months.map(month => (
                          <td key={month} style={{ padding: "9px 4px", textAlign: "center" }}>
                            <span style={{ fontSize: 11, fontWeight: 700, color: colTotal(month) > 0 ? "#4ade80" : "#374151" }}>
                              {colTotal(month) > 0 ? `₦${colTotal(month).toLocaleString()}` : "—"}
                            </span>
                          </td>
                        ))}
                        {/* Grand total */}
                        <td style={{ padding: "9px 10px", textAlign: "center", background: "rgba(74,222,128,0.15)" }}>
                          <span style={{ fontSize: 13, fontWeight: 800, color: "#4ade80" }}>₦{grandTotal.toLocaleString()}</span>
                        </td>
                        <td />
                      </tr>
                    </tbody>
                  </table>
                </div>
              )}

              {/* Note */}
              {donors.length > 0 && (
                <div style={{ marginTop: 12, fontSize: 11, color: "#4b5563", textAlign: "center" }}>
                  Tap any cell to enter or edit an amount · Press Enter or tap away to save
                </div>
              )}
            </div>
          );
        })()}

        {/* ══════════════════════ HISTORY ══════════════════════ */}
        {tab === "history" && (
          <div>
            {/* Header row with admin button */}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: "#e8eaf0", display: "flex", alignItems: "center", gap: 8 }}>
                📅 Session History
                <span style={{ background: "rgba(255,255,255,0.08)", color: "#9ca3af", borderRadius: 6, padding: "2px 9px", fontSize: 12 }}>{sessionHistory.length}</span>
              </div>
              {!isAdmin
                ? <button onClick={() => setShowAdminLogin(true)} style={{ fontSize: 11, padding: "6px 12px", borderRadius: 7, border: "1px solid rgba(251,191,36,0.4)", background: "rgba(251,191,36,0.08)", color: "#fbbf24", cursor: "pointer", fontWeight: 700 }}>🔐 Admin Login</button>
                : <button onClick={() => { setIsAdmin(false); setEditingHistoryId(null); }} style={{ fontSize: 11, padding: "6px 12px", borderRadius: 7, border: "1px solid rgba(74,222,128,0.4)", background: "rgba(74,222,128,0.08)", color: "#4ade80", cursor: "pointer", fontWeight: 700 }}>✅ Admin · Logout</button>
              }
            </div>

            {/* Admin Login Modal */}
            {showAdminLogin && (
              <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.88)", zIndex: 300, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }} onClick={() => setShowAdminLogin(false)}>
                <div onClick={e => e.stopPropagation()} style={{ background: "#111827", borderRadius: 16, border: "1px solid rgba(255,255,255,0.1)", padding: 24, width: "100%", maxWidth: 360 }}>
                  <div style={{ fontSize: 16, fontWeight: 800, marginBottom: 4 }}>🔐 Admin Login</div>
                  <div style={{ fontSize: 11, color: "#6b7280", marginBottom: 18 }}>Enter credentials to edit session history</div>
                  <div style={{ marginBottom: 10 }}>
                    <Lbl>Username</Lbl>
                    <input value={adminUser} onChange={e => setAdminUser(e.target.value)} placeholder="Username" style={iS} autoComplete="off" />
                  </div>
                  <div style={{ marginBottom: 14 }}>
                    <Lbl>Password</Lbl>
                    <input type="password" value={adminPass} onChange={e => setAdminPass(e.target.value)} placeholder="Password" style={iS} onKeyDown={e => { if (e.key === "Enter") { if (adminUser === ADMIN_USER && adminPass === ADMIN_PASS) { setIsAdmin(true); setShowAdminLogin(false); setAdminUser(""); setAdminPass(""); setAdminError(""); } else { setAdminError("Incorrect username or password"); } }}} />
                  </div>
                  {adminError && <div style={{ fontSize: 11, color: "#f87171", marginBottom: 10 }}>❌ {adminError}</div>}
                  <button onClick={() => {
                    if (adminUser === ADMIN_USER && adminPass === ADMIN_PASS) {
                      setIsAdmin(true); setShowAdminLogin(false); setAdminUser(""); setAdminPass(""); setAdminError("");
                    } else { setAdminError("Incorrect username or password"); }
                  }} style={{ width: "100%", padding: "12px", borderRadius: 10, border: "none", background: "linear-gradient(135deg,#1d4ed8,#60a5fa)", color: "#fff", fontWeight: 800, cursor: "pointer", fontSize: 13 }}>Login</button>
                </div>
              </div>
            )}

            {sessionHistory.length === 0 && (
              <div style={{ textAlign: "center", padding: "40px 0", color: "#374151" }}>
                <div style={{ fontSize: 32, marginBottom: 10 }}>📅</div>
                <div style={{ fontSize: 13 }}>No saved sessions yet</div>
                <div style={{ fontSize: 11, color: "#374151", marginTop: 4 }}>End a session from the Session tab to save it here</div>
              </div>
            )}

            {/* Session detail view */}
            {viewingSession && (() => {
              const sIdx = sessionHistory.findIndex(x => x.id === viewingSession);
              const s = sessionHistory[sIdx];
              if (!s) return null;
              const income = s.txns.reduce((sum, t) => sum + t.amount, 0);
              const exp = s.expenses.reduce((sum, e) => sum + e.amount, 0);
              const isEditingThis = isAdmin && editingHistoryId === s.id;
              return (
                <div>
                  <div style={{ display: "flex", gap: 8, marginBottom: 14, alignItems: "center" }}>
                    <button onClick={() => { setViewingSession(null); setEditingHistoryId(null); }} style={{ padding: "8px 14px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.12)", background: "rgba(255,255,255,0.05)", color: "#9ca3af", cursor: "pointer", fontSize: 12, fontWeight: 600 }}>← Back</button>
                    {isAdmin && !isEditingThis && <button onClick={() => setEditingHistoryId(s.id)} style={{ padding: "8px 14px", borderRadius: 8, border: "1px solid rgba(251,191,36,0.4)", background: "rgba(251,191,36,0.08)", color: "#fbbf24", cursor: "pointer", fontSize: 12, fontWeight: 700 }}>✏️ Edit Session</button>}
                    {isEditingThis && <button onClick={() => setEditingHistoryId(null)} style={{ padding: "8px 14px", borderRadius: 8, border: "1px solid rgba(74,222,128,0.4)", background: "rgba(74,222,128,0.08)", color: "#4ade80", cursor: "pointer", fontSize: 12, fontWeight: 700 }}>✅ Done Editing</button>}
                    {isAdmin && <button onClick={() => { if (window.confirm("Delete this session permanently?")) { setSessionHistory(h => h.filter(x => x.id !== s.id)); setViewingSession(null); setEditingHistoryId(null); } }} style={{ padding: "8px 12px", borderRadius: 8, border: "1px solid rgba(239,68,68,0.3)", background: "rgba(239,68,68,0.07)", color: "#f87171", cursor: "pointer", fontSize: 12, fontWeight: 700 }}>🗑 Delete</button>}
                  </div>

                  <div style={{ background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 14, padding: 16, marginBottom: 14 }}>
                    {isEditingThis ? (
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                        <div><Lbl>Session Type</Lbl>
                          <select value={s.sessionType} onChange={e => setSessionHistory(h => h.map((x,i) => i===sIdx ? {...x, sessionType: e.target.value} : x))} style={sS}>
                            {SESSION_TYPES.map(t => <option key={t} value={t} style={{ background: "#1a2235" }}>{t}</option>)}
                          </select>
                        </div>
                        <div><Lbl>Date</Lbl>
                          <input type="date" value={s.sessionDate} onChange={e => setSessionHistory(h => h.map((x,i) => i===sIdx ? {...x, sessionDate: e.target.value} : x))} style={iS} />
                        </div>
                      </div>
                    ) : (
                      <div>
                        <div style={{ fontSize: 16, fontWeight: 800, color: "#e8eaf0", marginBottom: 4 }}>{s.sessionType} — {new Date(s.sessionDate + "T12:00:00").toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long", year: "numeric" })}</div>
                        <div style={{ fontSize: 11, color: "#4b5563" }}>Saved {new Date(s.savedAt).toLocaleString("en-GB")}</div>
                      </div>
                    )}
                  </div>

                  {/* Stats */}
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 8, marginBottom: 14 }}>
                    {[
                      { l: "Players", v: s.players.length, c: "#60a5fa" },
                      { l: "Goals", v: s.goals.length, c: "#4ade80" },
                      { l: "Income", v: N(income), c: "#4ade80" },
                      { l: "Net", v: N(income - exp), c: income - exp >= 0 ? "#4ade80" : "#f87171" },
                    ].map(x => (
                      <div key={x.l} style={{ background: "rgba(255,255,255,0.04)", borderRadius: 10, padding: "10px 6px", textAlign: "center", border: "1px solid rgba(255,255,255,0.07)" }}>
                        <div style={{ fontSize: 13, fontWeight: 800, color: x.c }}>{x.v}</div>
                        <div style={{ fontSize: 9, color: "#6b7280", marginTop: 2 }}>{x.l}</div>
                      </div>
                    ))}
                  </div>

                  {/* Players */}
                  {s.players.length > 0 && (
                    <div style={{ marginBottom: 14 }}>
                      <div style={{ fontSize: 11, color: "#6b7280", fontWeight: 700, textTransform: "uppercase", marginBottom: 8 }}>Players ({s.players.length})</div>
                      {s.players.map(p => {
                        const pg = s.goals.filter(g => g.scorerName === p.name).length;
                        const pa = s.goals.filter(g => g.assistName === p.name).length;
                        const pSet = s.playerSets[p.id];
                        const wasPaid = s.txns.some(t => (t.playerIds || []).includes(p.id));
                        return (
                          <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "9px 12px", borderRadius: 9, marginBottom: 5, background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.06)" }}>
                            <div style={{ width: 28, height: 28, borderRadius: "50%", background: "linear-gradient(135deg,#1d4ed8,#60a5fa)", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 11, color: "#fff", flexShrink: 0 }}>{p.name.charAt(0).toUpperCase()}</div>
                            <div style={{ flex: 1 }}>
                              <div style={{ fontSize: 13, fontWeight: 600 }}>{p.name}</div>
                              <div style={{ display: "flex", gap: 4, flexWrap: "wrap", marginTop: 2 }}>
                                {wasPaid && <span style={{ fontSize: 9, background: "rgba(74,222,128,0.15)", color: "#4ade80", borderRadius: 4, padding: "1px 5px", fontWeight: 700 }}>✓ PAID</span>}
                                {pSet === "sub" && <span style={{ fontSize: 9, background: "rgba(251,146,60,0.15)", color: "#fb923c", borderRadius: 4, padding: "1px 5px", fontWeight: 700 }}>🔄 SUB</span>}
                                {pSet && pSet !== "sub" && <span style={{ fontSize: 9, background: "rgba(255,255,255,0.08)", color: "#9ca3af", borderRadius: 4, padding: "1px 5px", fontWeight: 700 }}>Set {pSet}</span>}
                                {pg > 0 && <span style={{ fontSize: 9, color: "#60a5fa" }}>⚽{pg}</span>}
                                {pa > 0 && <span style={{ fontSize: 9, color: "#a78bfa" }}>🅰{pa}</span>}
                              </div>
                            </div>
                            {isEditingThis && <button onClick={() => setSessionHistory(h => h.map((x,i) => i===sIdx ? {...x, players: x.players.filter(pl => pl.id !== p.id)} : x))} style={{ width: 24, height: 24, borderRadius: 5, border: "none", background: "rgba(239,68,68,0.12)", color: "#ef4444", cursor: "pointer", fontSize: 11 }}>✕</button>}
                          </div>
                        );
                      })}
                    </div>
                  )}

                  {/* Goals */}
                  {s.goals.length > 0 && (
                    <div style={{ marginBottom: 14 }}>
                      <div style={{ fontSize: 11, color: "#6b7280", fontWeight: 700, textTransform: "uppercase", marginBottom: 8 }}>Goals ({s.goals.length})</div>
                      {s.goals.map((g, i) => (
                        <div key={g.id} style={{ display: "flex", gap: 10, alignItems: "center", padding: "7px 12px", borderRadius: 7, marginBottom: 4, background: "rgba(96,165,250,0.05)", border: "1px solid rgba(96,165,250,0.12)", fontSize: 12 }}>
                          <span style={{ color: "#4b5563", fontWeight: 700 }}>{i+1}.</span>
                          <span style={{ color: "#e8eaf0", fontWeight: 600, flex: 1 }}>⚽ {g.scorerName} {g.assistName && <span style={{ color: "#a78bfa" }}>🅰 {g.assistName}</span>}</span>
                          {isEditingThis && <button onClick={() => setSessionHistory(h => h.map((x,idx) => idx===sIdx ? {...x, goals: x.goals.filter(gl => gl.id !== g.id)} : x))} style={{ width: 24, height: 24, borderRadius: 5, border: "none", background: "rgba(239,68,68,0.12)", color: "#ef4444", cursor: "pointer", fontSize: 11 }}>✕</button>}
                        </div>
                      ))}
                    </div>
                  )}

                  {/* Cards */}
                  {s.cards && s.cards.length > 0 && (
                    <div style={{ marginBottom: 14 }}>
                      <div style={{ fontSize: 11, color: "#6b7280", fontWeight: 700, textTransform: "uppercase", marginBottom: 8 }}>Cards ({s.cards.length})</div>
                      {s.cards.map(c => (
                        <div key={c.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "7px 12px", borderRadius: 7, marginBottom: 4, background: c.type === "yellow" ? "rgba(251,191,36,0.07)" : "rgba(239,68,68,0.07)", border: `1px solid ${c.type === "yellow" ? "rgba(251,191,36,0.2)" : "rgba(239,68,68,0.2)"}`, fontSize: 12 }}>
                          <div style={{ width: 12, height: 16, borderRadius: 2, background: c.type === "yellow" ? "#fbbf24" : "#ef4444", flexShrink: 0 }} />
                          <span style={{ flex: 1, color: "#e8eaf0", fontWeight: 600 }}>{c.playerName}</span>
                          <span style={{ color: "#6b7280" }}>{N(CARD_FINE[c.type])}</span>
                          <span style={{ fontSize: 10, color: c.paid ? "#4ade80" : "#f87171", fontWeight: 700 }}>{c.paid ? "✓ Paid" : "Unpaid"}</span>
                        </div>
                      ))}
                    </div>
                  )}

                  {/* Transactions */}
                  {s.txns.length > 0 && (
                    <div style={{ marginBottom: 14 }}>
                      <div style={{ fontSize: 11, color: "#6b7280", fontWeight: 700, textTransform: "uppercase", marginBottom: 8 }}>Payments · {N(income)}</div>
                      {s.txns.map(t => (
                        <div key={t.id} style={{ display: "flex", justifyContent: "space-between", padding: "7px 12px", borderRadius: 7, marginBottom: 4, background: "rgba(74,222,128,0.04)", border: "1px solid rgba(74,222,128,0.1)", fontSize: 12 }}>
                          <span style={{ color: "#d1fae5" }}>{t.note}</span>
                          <span style={{ color: "#4ade80", fontWeight: 700 }}>+{N(t.amount)}</span>
                        </div>
                      ))}
                    </div>
                  )}

                  {/* Set log in history */}
                  {s.setLog && s.setLog.length > 0 && (
                    <div style={{ marginBottom: 14 }}>
                      <div style={{ fontSize: 11, color: "#6b7280", fontWeight: 700, textTransform: "uppercase", marginBottom: 8 }}>Sets Played ({s.setLog.length}) · Total {fmt(s.setLog.reduce((t,x) => t + x.duration, 0))}</div>
                      {s.setLog.map((sl, i) => (
                        <div key={sl.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 12px", borderRadius: 8, marginBottom: 4, background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.06)", fontSize: 12 }}>
                          <div style={{ width: 22, height: 22, borderRadius: "50%", background: "linear-gradient(135deg,#1d4ed8,#60a5fa)", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 10, color: "#fff", flexShrink: 0 }}>{sl.setNum}</div>
                          <div style={{ flex: 1 }}>
                            <span style={{ color: "#60a5fa", fontWeight: 700 }}>{sl.teamA}</span> <span style={{ color: "#4b5563" }}>vs</span> <span style={{ color: "#f87171", fontWeight: 700 }}>{sl.teamB}</span>
                            <span style={{ color: "#4b5563", marginLeft: 6 }}>{sl.result === "pk" ? "🥅 PK" : "⚽"}</span>
                            <span style={{ color: "#4ade80", fontWeight: 700, marginLeft: 4 }}>{sl.winner} wins</span>
                          </div>
                          <span style={{ color: "#fbbf24", fontWeight: 700 }}>{fmt(sl.duration)}</span>
                        </div>
                      ))}
                    </div>
                  )}

                  {/* Session note */}
                  <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 10, padding: 12 }}>
                    <div style={{ fontSize: 10, color: "#6b7280", fontWeight: 700, textTransform: "uppercase", marginBottom: 6 }}>Session Notes</div>
                    {isEditingThis
                      ? <textarea value={s.sessionNote || ""} onChange={e => setSessionHistory(h => h.map((x,i) => i===sIdx ? {...x, sessionNote: e.target.value} : x))} rows={3} style={{ ...iS, resize: "vertical", lineHeight: 1.6 }} />
                      : <div style={{ fontSize: 12, color: s.sessionNote ? "#9ca3af" : "#374151", lineHeight: 1.6 }}>{s.sessionNote || "No notes for this session"}</div>
                    }
                  </div>
                </div>
              );
            })()}

            {/* Session list */}
            {!viewingSession && [...sessionHistory].reverse().map(s => {
              const income = s.txns.reduce((sum, t) => sum + t.amount, 0);
              return (
                <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "14px 16px", borderRadius: 12, marginBottom: 10, background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", cursor: "pointer" }}
                  onClick={() => setViewingSession(s.id)}>
                  <div style={{ width: 42, height: 42, borderRadius: 10, background: "linear-gradient(135deg,#1e3a5f,#3b82f6)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, flexShrink: 0 }}>📅</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 14, fontWeight: 700, color: "#e8eaf0" }}>{s.sessionType}</div>
                    <div style={{ fontSize: 11, color: "#6b7280" }}>{new Date(s.sessionDate + "T12:00:00").toLocaleDateString("en-GB", { weekday: "short", day: "numeric", month: "short", year: "numeric" })}</div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: 13, fontWeight: 800, color: "#4ade80" }}>{N(income)}</div>
                    <div style={{ fontSize: 10, color: "#6b7280" }}>{s.players.length} players · {s.goals.length} goals</div>
                  </div>
                  <span style={{ color: "#374151", fontSize: 16 }}>›</span>
                </div>
              );
            })}
          </div>
        )}

      </div>

      {/* ── Footer ── */}
      <div style={{ textAlign: "center", padding: "22px 16px 30px", borderTop: "1px solid rgba(255,255,255,0.06)", marginTop: 10 }}>
        <div style={{ fontSize: 11, fontWeight: 800, color: "#4ade80", letterSpacing: "0.5px", marginBottom: 4 }}>Built by DAAB EDGE INNOVATIONS</div>
        <div style={{ display: "flex", justifyContent: "center", gap: 16, flexWrap: "wrap" }}>
          <a href="https://wa.me/2348132120222" target="_blank" rel="noopener noreferrer" style={{ fontSize: 11, color: "#6b7280", textDecoration: "none", display: "flex", alignItems: "center", gap: 4 }}>
            <span style={{ color: "#25d366" }}>💬</span> 08132120222
          </a>
          <a href="mailto:daab.edge@gmail.com" style={{ fontSize: 11, color: "#6b7280", textDecoration: "none", display: "flex", alignItems: "center", gap: 4 }}>
            <span>✉️</span> daab.edge@gmail.com
          </a>
        </div>
      </div>

    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>

  <title>SHAS FC Manager</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0a0e1a;font-family:'DM Sans','Segoe UI',sans-serif;color:#e8eaf0;}
    input[type=range]{-webkit-appearance:none;appearance:none;height:6px;border-radius:3px;background:rgba(255,255,255,0.1);outline:none;}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#4ade80;cursor:pointer;}
    input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1) opacity(0.4);}
    ::-webkit-scrollbar{display:none;}
    select option{background:#1a2235!important;color:#fff!important;}
    @keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 6px #4ade80}50%{opacity:.4;box-shadow:0 0 2px #4ade80}}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>

// ── Error Boundary ─────────────────────────────────────────────────────
class ErrorBoundary extends Component {
  constructor(p){super(p);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(e){return{hasError:true,error:e};}
  render(){
    if(!this.state.hasError)return this.props.children;
    return(
      <div style={{minHeight:"100vh",background:"#0a0e1a",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
        <div style={{background:"#111827",border:"1px solid rgba(239,68,68,0.3)",borderRadius:16,padding:28,maxWidth:440,width:"100%"}}>
          <div style={{fontSize:36,marginBottom:12}}>⚠️</div>
          <div style={{fontSize:18,fontWeight:800,color:"#f87171",marginBottom:8}}>App Error</div>
          <div style={{background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:10,padding:12,marginBottom:16,fontFamily:"monospace",fontSize:11,color:"#f87171",wordBreak:"break-all"}}>{this.state.error?.message}</div>
          <button onClick={()=>window.location.reload()} style={{width:"100%",padding:"12px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#1d4ed8,#60a5fa)",color:"#fff",fontWeight:800,cursor:"pointer",fontSize:13}}>🔄 Reload</button>
        </div>
      </div>
    );
  }
}

// Account summary card
const AccCard=({title,icon,color,income,expenses,badge})=>{
  const bal=income-expenses;
  return(
    <div style={{background:`rgba(${color},0.07)`,border:`1px solid rgba(${color},0.25)`,borderRadius:14,padding:16,marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>

        {badge&&<span style={{fontSize:10,background:`rgba(${color},0.15)`,color:`rgb(${color})`,borderRadius:10,padding:"2px 8px",fontWeight:700}}>{badge}</span>}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
        <div style={{background:"rgba(74,222,128,0.08)",border:"1px solid rgba(74,222,128,0.2)",borderRadius:10,padding:"10px 8px",textAlign:"center"}}>
          <div style={{fontSize:13,fontWeight:800,color:"#4ade80"}}>{N(income)}</div>
          <div style={{fontSize:9,color:"#6b7280",marginTop:2}}>Income</div>
        </div>

// ── ADMIN LOGIN SCREEN ─────────────────────────────────────────────────
function LoginScreen({onLogin}){
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);

  const login=async()=>{
    if(!email||!pass)return;
    setLoading(true);setErr("");
    try{
      await firebase.auth().signInWithEmailAndPassword(email,pass);
      onLogin();
    }catch(e){
      setErr("Incorrect email or password");
    }finally{setLoading(false);}
  };

  return(
    <div style={{minHeight:"100vh",background:"#0a0e1a",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{width:"100%",maxWidth:380}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{width:80,height:80,borderRadius:20,background:"linear-gradient(135deg,#065f46,#4ade80)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:40,margin:"0 auto 16px"}}>⚽</div>
          <div style={{fontSize:22,fontWeight:800,color:"#fbbf24"}}>SHAS FC Manager</div>
          <div style={{fontSize:12,color:"#6b7280",marginTop:4}}>Admin Access Only</div>
        </div>
        <div style={{background:"#111827",border:"1px solid rgba(255,255,255,0.1)",borderRadius:16,padding:24}}>
          <div style={{marginBottom:14}}>
            <Lbl>Email</Lbl>
            <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="admin@email.com" style={iS} type="email" autoComplete="email" onKeyDown={e=>e.key==="Enter"&&login()}/>
          </div>
          <div style={{marginBottom:20}}>
            <Lbl>Password</Lbl>
            <input value={pass} onChange={e=>setPass(e.target.value)} placeholder="Password" style={iS} type="password" autoComplete="current-password" onKeyDown={e=>e.key==="Enter"&&login()}/>
          </div>
          {err&&<div style={{fontSize:12,color:"#f87171",marginBottom:14,padding:"8px 12px",background:"rgba(239,68,68,0.1)",borderRadius:8}}>❌ {err}</div>}
          <button onClick={login} disabled={loading||!email||!pass} style={{width:"100%",padding:"13px",borderRadius:10,border:"none",background:email&&pass?"linear-gradient(135deg,#1d4ed8,#60a5fa)":"rgba(255,255,255,0.06)",color:email&&pass?"#fff":"#4b5563",fontWeight:800,cursor:email&&pass?"pointer":"not-allowed",fontSize:14}}>
            {loading?"Signing in...":"🔐 Sign In"}
          </button>
        </div>
        <div style={{textAlign:"center",marginTop:16,fontSize:11,color:"#374151"}}>
          State Housing All Stars FC · Calabar, Nigeria
        </div>
      </div>
    </div>
  );
}

    setSyncStatus("saving");

     playerSets,pNotes,sessionType,sessionDate,sessionNote,setLog,

  // ── DERIVED ────────────────────────────────────────────────────────
  const sessionFee=SESSION_FEES[sessionType];
  const isReg=name=>members.filter(m=>m&&m.name).some(m=>m.name.toLowerCase()===name.toLowerCase());
  const paidIds=new Set(txns.filter(t=>t&&["session","cash","group","transfer"].includes(t.type)).flatMap(t=>t.playerIds||[]));

  // ── ACTIONS ────────────────────────────────────────────────────────
  const addMember=()=>{
    if(!mName.trim())return;

    // Write directly to permanent Firebase path — bypasses session save entirely

  const removePlayer=id=>{setPlayers(ps=>ps.filter(p=>p&&p.id!==id));setPlayerSets(ps=>{const n={...ps};delete n[id];return n;});};

  // Write every transaction permanently to finance_ledger AND training_txns
  const writeLedger=txn=>{
    const entry={
      id:Date.now(),
      date:sessionDate,
      timestamp:new Date().toISOString(),
      deleted:false,
      ...txn
    };
    // Write to permanent ledger
    if(ledgerRef.current){
      ledgerRef.current.child(String(entry.id)).set(entry)
        .catch(e=>console.error("Ledger write failed:",e));
    }
    setLedger(l=>[...l,entry]);
    // Write income entries to permanent training_txns too
    if(entry.account==="training"&&entry.amount>0){
      const txnEntry={id:entry.id,date:entry.date,amount:entry.amount,
        note:entry.note,method:entry.method,category:entry.category,
        type:entry.type,playerIds:entry.playerIds||[],

      if(txnsRef.current){
        txnsRef.current.child(String(entry.id)).set(txnEntry)
          .catch(e=>console.error("Txn write failed:",e));
      }
      setTxns(t=>[...t,txnEntry]);

    if(!latePlayer)return;

    const lateTotalFee=sessionFee+LATE_FEE; // e.g. 200+100=300
    writeLedger({
      type:"late",
      playerIds:[pid],
      amount:lateTotalFee,
      note:`Training levy (late) – ${pname}`,
      method:lateMethod,
      category:"Training Levy",
      account:"training",

    });

    if(cardsRef.current) cardsRef.current.child(String(cardId)).update({paid:true}).catch(e=>console.error("Card update failed:",e));
    writeLedger({type:"card_fine",playerIds:[],playerName:card.playerName,amount:CARD_FINE[card.type],note:`${card.type==="yellow"?"Yellow":"Red"} card fine – ${card.playerName}`,method,category:"Fines",account:"training"});

  const addTrainingExpense=()=>{
    if(!txDesc.trim()||!txAmt)return;
    const entry={id:Date.now(),desc:txDesc.trim(),amount:Number(txAmt),category:txCat,date:txDate,account:"training"};
    setTrainingExpenses(e=>[...e,entry]);
    writeLedger({type:"expense",note:entry.desc,amount:-entry.amount,category:entry.category,method:"expense",account:"training"});
    setTxDesc("");setTxAmt("");setShowTxForm(false);
  };
  const addDonationExpense=()=>{
    if(!dxDesc.trim()||!dxAmt)return;
    const entry={id:Date.now(),desc:dxDesc.trim(),amount:Number(dxAmt),category:dxCat,date:dxDate,account:"donation"};
    setDonationExpenses(e=>[...e,entry]);

    setDonations(d=>({...d,[donorId]:{...(d[donorId]||{}),[month]:amt}}));

    if(donationsRef.current){
      donationsRef.current.child(String(donorId)).child(month).set(amt)

    }

    lines.push("=".repeat(50));

    const tExp=sessions.reduce((s,x)=>s+(x.trainingExpenses||[]).reduce((a,e)=>a+(e.amount||0),0),0);

    sessions.forEach((s,idx)=>{

      MONTHS.forEach(m=>{const v=((donations||{})[d.id]||{})[m]||0;row.push(v);total+=v;});

    donRows.push([]);
    donRows.push(colTotals);

              }} style={{width:"100%",padding:"14px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#7f1d1d,#ef4444)",color:"#fff",fontWeight:800,fontSize:14,cursor:"pointer"}}>💾 End Session & Start New Day</button>
            </div>
          </div>
        )}

        {/* ══ MEMBERS ══ */}
        {tab==="members"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{fontSize:13,color:"#6b7280"}}>{(members||[]).length} registered members</div>
              <button onClick={()=>setShowMForm(f=>!f)} style={{fontSize:11,padding:"6px 12px",borderRadius:7,border:`1px solid ${showMForm?"rgba(239,68,68,0.4)":"rgba(167,139,250,0.4)"}`,background:showMForm?"rgba(239,68,68,0.1)":"rgba(167,139,250,0.1)",color:showMForm?"#f87171":"#a78bfa",cursor:"pointer",fontWeight:600}}>{showMForm?"✕ Cancel":"+ Add Member"}</button>
            </div>
            {showMForm&&(
              <div onClick={e=>e.stopPropagation()} style={{background:"rgba(167,139,250,0.06)",border:"1px solid rgba(167,139,250,0.2)",borderRadius:12,padding:14,marginBottom:14}}>
                <Lbl c="#a78bfa">New Member</Lbl>
                <div style={{display:"flex",gap:8,marginTop:6}}>
                  <input value={mName} onChange={e=>setMName(e.target.value)} placeholder="Full name" style={{...iS,flex:1}} onKeyDown={e=>e.key==="Enter"&&addMember()}/>
                  <button onClick={addMember} disabled={!mName.trim()} style={{padding:"9px 16px",borderRadius:8,border:"none",background:mName.trim()?"linear-gradient(135deg,#6d28d9,#a78bfa)":"rgba(255,255,255,0.05)",color:mName.trim()?"#fff":"#4b5563",fontWeight:800,cursor:mName.trim()?"pointer":"not-allowed"}}>Add</button>
                </div>
              </div>
            )}
            {(members||[]).filter(m=>m&&m.id).map(m=>(
              <div key={m.id} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 14px",borderRadius:10,marginBottom:7,background:"rgba(167,139,250,0.06)",border:"1px solid rgba(167,139,250,0.15)"}}>
                <div style={{width:34,height:34,borderRadius:"50%",background:"linear-gradient(135deg,#6d28d9,#a78bfa)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:14,color:"#fff",flexShrink:0}}>{m.name.charAt(0).toUpperCase()}</div>
                <div style={{flex:1}}><div style={{fontWeight:600,fontSize:14}}>{m.name}</div><div style={{fontSize:10,color:"#a78bfa",fontWeight:600}}>REGISTERED MEMBER</div></div>
                <button onClick={()=>addMemberToSession(m)} style={{padding:"6px 10px",borderRadius:7,border:`1px solid ${(players||[]).find(p=>p&&p.name&&m.name&&p.name.toLowerCase()===m.name.toLowerCase())?"rgba(74,222,128,0.4)":"rgba(255,255,255,0.1)"}`,background:(players||[]).find(p=>p&&p.name&&m.name&&p.name.toLowerCase()===m.name.toLowerCase())?"rgba(74,222,128,0.15)":"rgba(255,255,255,0.04)",color:(players||[]).find(p=>p&&p.name&&m.name&&p.name.toLowerCase()===m.name.toLowerCase())?"#4ade80":"#9ca3af",cursor:"pointer",fontSize:11,fontWeight:600}}>{(players||[]).find(p=>p&&p.name&&m.name&&p.name.toLowerCase()===m.name.toLowerCase())?"✓ Added":"+ Session"}</button>
                <button onClick={()=>removeMember(m.id)} style={{width:28,height:28,borderRadius:6,border:"none",background:"rgba(239,68,68,0.1)",color:"#ef4444",cursor:"pointer",fontSize:13}}>✕</button>
              </div>
            ))}
          </div>
        )}

        {/* ══ SQUAD ══ */}
        {tab==="squad"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div style={{fontSize:13,color:"#6b7280"}}>{(players||[]).length} players · {paidIds.size} paid</div>
              <button onClick={()=>setShowPForm(f=>!f)} style={{fontSize:11,padding:"6px 12px",borderRadius:7,border:`1px solid ${showPForm?"rgba(239,68,68,0.4)":"rgba(74,222,128,0.4)"}`,background:showPForm?"rgba(239,68,68,0.1)":"rgba(74,222,128,0.1)",color:showPForm?"#f87171":"#4ade80",cursor:"pointer",fontWeight:600}}>{showPForm?"✕ Cancel":"+ Add Player"}</button>
            </div>
            {showPForm&&(
              <div onClick={e=>e.stopPropagation()} style={{background:"rgba(74,222,128,0.05)",border:"1px solid rgba(74,222,128,0.2)",borderRadius:12,padding:14,marginBottom:14}}>
                <Lbl c="#4ade80">Add Player</Lbl>
                <div style={{display:"flex",gap:8,marginTop:6}}>
                  <input value={pName} onChange={e=>setPName(e.target.value)} placeholder="Player name" style={{...iS,flex:1}} onKeyDown={e=>e.key==="Enter"&&addPlayer()}/>
                  <button onClick={addPlayer} disabled={!pName.trim()} style={{padding:"9px 16px",borderRadius:8,border:"none",background:pName.trim()?"linear-gradient(135deg,#16a34a,#4ade80)":"rgba(255,255,255,0.05)",color:pName.trim()?"#0a0e1a":"#4b5563",fontWeight:800,cursor:pName.trim()?"pointer":"not-allowed"}}>Add</button>
                </div>
              </div>
            )}
            {(players||[]).filter(p=>p&&p.id).map(p=>{
              const paid=paidIds.has(p.id);const reg=isReg(p.name||"");
              const g=(goals||[]).filter(x=>x&&x.scorerName===p.name).length;
              const a=(goals||[]).filter(x=>x&&x.assistName===p.name).length;
              const isLate=lateIds.has(p.id);
              const currentSet=(playerSets||{})[p.id]!==undefined?(playerSets||{})[p.id]:"";
              return(
                <div key={p.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:10,marginBottom:7,background:paid?(reg?"rgba(167,139,250,0.07)":"rgba(74,222,128,0.06)"):"rgba(255,255,255,0.03)",border:`1px solid ${paid?(reg?"rgba(167,139,250,0.2)":"rgba(74,222,128,0.2)"):"rgba(255,255,255,0.06)"}`}}>
                  <div style={{width:34,height:34,borderRadius:"50%",background:reg?"linear-gradient(135deg,#6d28d9,#a78bfa)":paid?"rgba(74,222,128,0.2)":"rgba(255,255,255,0.08)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:14,color:reg?"#fff":paid?"#4ade80":"#6b7280",flexShrink:0}}>{(p.name||"?").charAt(0).toUpperCase()}</div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:14,color:"#fff",marginBottom:3}}>{p.name}</div>
                    <div style={{display:"flex",gap:4,alignItems:"center",flexWrap:"wrap"}}>
                      {paid?<span style={{fontSize:9,background:"rgba(74,222,128,0.15)",color:"#4ade80",borderRadius:4,padding:"1px 5px",fontWeight:700}}>✓ PAID</span>:<span style={{fontSize:9,background:"rgba(248,113,113,0.15)",color:"#f87171",borderRadius:4,padding:"1px 5px",fontWeight:700}}>UNPAID</span>}
                      {reg&&<span style={{fontSize:9,background:"rgba(167,139,250,0.2)",color:"#a78bfa",borderRadius:4,padding:"1px 5px",fontWeight:700}}>REG</span>}
                      {isLate&&<span style={{fontSize:9,background:"rgba(251,191,36,0.15)",color:"#fbbf24",borderRadius:4,padding:"1px 5px",fontWeight:700}}>LATE</span>}
                      {g>0&&<span style={{fontSize:10,color:"#60a5fa"}}>⚽{g}</span>}
                      {a>0&&<span style={{fontSize:10,color:"#a78bfa"}}>🅰{a}</span>}
                    </div>
                  </div>
                  <select value={currentSet} onChange={e=>{const val=e.target.value==="sub"?"sub":(Number(e.target.value)||"");setPlayerSets(ps=>({...ps,[p.id]:val}));}} style={{...sS,width:currentSet==="sub"?80:70,fontSize:11,padding:"5px 22px 5px 8px",backgroundColor:currentSet==="sub"?"rgba(251,146,60,0.15)":"#1a2235",borderColor:currentSet==="sub"?"rgba(251,146,60,0.4)":"rgba(255,255,255,0.12)",color:currentSet==="sub"?"#fb923c":"#fff"}}>
                    <option value="">Set?</option><option value="sub">🔄 SUB</option>
                    {setNumbers.slice(0,8).map(n=><option key={n} value={n}>Set {n}</option>)}
                  </select>
                  <button onClick={()=>removePlayer(p.id)} style={{width:28,height:28,borderRadius:6,border:"none",background:"rgba(239,68,68,0.1)",color:"#ef4444",cursor:"pointer",fontSize:13}}>✕</button>
                </div>
              );
            })}
          </div>
        )}

        {/* ══ MATCH ══ */}
        {tab==="match"&&(
          <div>
            {/* ── INTELLIGENT STATS TABLE ─────────────────────────────── */}
            {(()=>{
              const nameSet=new Set();
              (goals||[]).filter(g=>g).forEach(g=>{
                if(g.scorerName)nameSet.add(g.scorerName.trim());
                if(g.assistName)nameSet.add(g.assistName.trim());
              });
              (cards||[]).filter(c=>c).forEach(c=>{
                if(c.playerName)nameSet.add(c.playerName.trim());
              });

              if(nameSet.size===0)return(
                <div style={{textAlign:"center",padding:"32px 16px",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:14,marginBottom:16}}>
                  <div style={{fontSize:36,marginBottom:10}}>📊</div>
                  <div style={{fontSize:13,color:"#6b7280"}}>Stats will appear here as you log goals and cards below</div>
                </div>
              );

              const fmtDate=d=>{try{return new Date(d+"T12:00:00").toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short",year:"numeric"});}catch(e){return d||"";}};

              const rows=Array.from(nameSet).map(name=>{
                const playerGoals=(goals||[]).filter(x=>x&&x.scorerName&&x.scorerName.trim()===name);
                const playerAssists=(goals||[]).filter(x=>x&&x.assistName&&x.assistName.trim()===name);
                const yCards=(cards||[]).filter(x=>x&&x.playerName&&x.playerName.trim()===name&&x.type==="yellow");
                const rCards=(cards||[]).filter(x=>x&&x.playerName&&x.playerName.trim()===name&&x.type==="red");
                const yOwed=yCards.filter(c=>!c.paid).length*CARD_FINE.yellow;
                const rOwed=rCards.filter(c=>!c.paid).length*CARD_FINE.red;
                const totalOwed=yOwed+rOwed;
                const allPaid=(yCards.length+rCards.length)>0&&totalOwed===0;
                return{name,
                  goals:playerGoals,assists:playerAssists,
                  yCards,rCards,
                  g:playerGoals.length,a:playerAssists.length,
                  y:yCards.length,r:rCards.length,
                  totalOwed,allPaid,hasCards:(yCards.length+rCards.length)>0
                };
              }).sort((a,b)=>(b.g+b.a)-(a.g+a.a)||a.name.localeCompare(b.name));

              return(
                <div style={{marginBottom:20}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                    <div style={{fontSize:13,fontWeight:700,color:"#fff"}}>📊 Match Stats</div>
                    <div style={{display:"flex",gap:10,fontSize:11,color:"#6b7280"}}>
                      <span>⚽ {(goals||[]).length}</span>
                      <span>🃏 {(cards||[]).length}</span>
                    </div>
                  </div>

                  {/* Table header */}
                  <div style={{borderRadius:14,border:"1px solid rgba(255,255,255,0.1)",overflow:"hidden"}}>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 36px 36px 36px 36px 80px",background:"rgba(255,255,255,0.06)",padding:"9px 12px",gap:4,alignItems:"center"}}>
                      <div style={{fontSize:10,fontWeight:700,color:"#9ca3af",textTransform:"uppercase"}}>Player</div>
                      <div style={{fontSize:16,textAlign:"center"}}>⚽</div>
                      <div style={{fontSize:16,textAlign:"center"}}>🅰️</div>
                      <div style={{width:14,height:18,borderRadius:2,background:"#fbbf24",margin:"0 auto"}}/>
                      <div style={{width:14,height:18,borderRadius:2,background:"#ef4444",margin:"0 auto"}}/>
                      <div style={{fontSize:10,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",textAlign:"center"}}>Fines</div>
                    </div>

                    {rows.map((row,i)=>{
                      const expanded=!!expandedRows[row.name];
                      return(
                        <div key={row.name}>
                          <div onClick={()=>setExpandedRows(r=>({...r,[row.name]:!r[row.name]}))} style={{display:"grid",gridTemplateColumns:"1fr 36px 36px 36px 36px 80px",padding:"11px 12px",gap:4,alignItems:"center",background:i%2===0?"transparent":"rgba(255,255,255,0.02)",borderTop:"1px solid rgba(255,255,255,0.05)",cursor:"pointer"}}>
                            <div style={{fontWeight:700,fontSize:13,color:"#e8eaf0",display:"flex",alignItems:"center",gap:5}}>
                              {row.name}
                              <span style={{fontSize:9,color:"#4b5563"}}>{expanded?"▲":"▼"}</span>
                            </div>
                            <div style={{textAlign:"center"}}>{row.g>0?<span style={{fontSize:13,fontWeight:800,color:"#60a5fa"}}>{row.g}</span>:<span style={{fontSize:12,color:"#374151"}}>—</span>}</div>
                            <div style={{textAlign:"center"}}>{row.a>0?<span style={{fontSize:13,fontWeight:800,color:"#a78bfa"}}>{row.a}</span>:<span style={{fontSize:12,color:"#374151"}}>—</span>}</div>
                            <div style={{textAlign:"center"}}>{row.y>0?<span style={{fontSize:13,fontWeight:800,color:"#fbbf24"}}>{row.y}</span>:<span style={{fontSize:12,color:"#374151"}}>—</span>}</div>
                            <div style={{textAlign:"center"}}>{row.r>0?<span style={{fontSize:13,fontWeight:800,color:"#f87171"}}>{row.r}</span>:<span style={{fontSize:12,color:"#374151"}}>—</span>}</div>
                            <div style={{textAlign:"center"}}>
                              {!row.hasCards?<span style={{fontSize:11,color:"#374151"}}>—</span>
                                :row.allPaid?<span style={{fontSize:11,fontWeight:700,color:"#4ade80",background:"rgba(74,222,128,0.12)",borderRadius:6,padding:"3px 7px"}}>✅ Paid</span>
                                :<div><div style={{fontSize:11,fontWeight:800,color:"#f87171"}}>{N(row.totalOwed)}</div><div style={{fontSize:9,color:"#6b7280"}}>owed</div></div>
                              }
                            </div>
                          </div>

                          {/* Expanded date breakdown */}
                          {expanded&&(
                            <div style={{background:"rgba(255,255,255,0.04)",borderTop:"1px solid rgba(255,255,255,0.06)",padding:"10px 14px"}}>
                              {row.goals.length>0&&(
                                <div style={{marginBottom:8}}>
                                  <div style={{fontSize:10,fontWeight:700,color:"#60a5fa",textTransform:"uppercase",marginBottom:5}}>⚽ Goals</div>
                                  {row.goals.map((g,gi)=>(
                                    <div key={g.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 8px",borderRadius:6,marginBottom:3,background:"rgba(96,165,250,0.06)",border:"1px solid rgba(96,165,250,0.12)"}}>
                                      <div>
                                        <span style={{fontSize:12,fontWeight:600}}>Goal {gi+1}</span>
                                        {g.assistName&&<span style={{fontSize:11,color:"#a78bfa"}}> · assist: {g.assistName}</span>}
                                        {g.isManual&&<span style={{fontSize:9,background:"rgba(251,191,36,0.2)",color:"#fbbf24",borderRadius:4,padding:"1px 5px",marginLeft:5,fontWeight:700}}>MANUAL</span>}
                                      </div>
                                      <div style={{fontSize:11,color:"#4ade80",fontWeight:600}}>{fmtDate(g.sessionDate||g.date)}</div>
                                    </div>
                                  ))}
                                </div>
                              )}
                              {row.assists.length>0&&(
                                <div style={{marginBottom:8}}>
                                  <div style={{fontSize:10,fontWeight:700,color:"#a78bfa",textTransform:"uppercase",marginBottom:5}}>🅰️ Assists</div>
                                  {row.assists.map((g,gi)=>(
                                    <div key={g.id+"a"} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 8px",borderRadius:6,marginBottom:3,background:"rgba(167,139,250,0.06)",border:"1px solid rgba(167,139,250,0.12)"}}>
                                      <span style={{fontSize:12,fontWeight:600}}>Assist {gi+1} · scorer: {g.scorerName}</span>
                                      <div style={{fontSize:11,color:"#a78bfa",fontWeight:600}}>{fmtDate(g.sessionDate||g.date)}</div>
                                    </div>
                                  ))}
                                </div>
                              )}
                              {(row.yCards.length>0||row.rCards.length>0)&&(
                                <div>
                                  <div style={{fontSize:10,fontWeight:700,color:"#fbbf24",textTransform:"uppercase",marginBottom:5}}>🃏 Cards</div>
                                  {[...row.yCards,...row.rCards].map(c=>(
                                    <div key={c.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 8px",borderRadius:6,marginBottom:3,background:c.type==="yellow"?"rgba(251,191,36,0.06)":"rgba(239,68,68,0.06)",border:`1px solid ${c.type==="yellow"?"rgba(251,191,36,0.18)":"rgba(239,68,68,0.18)"}`}}>
                                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                                        <div style={{width:10,height:14,borderRadius:2,background:c.type==="yellow"?"#fbbf24":"#ef4444"}}/>
                                        <span style={{fontSize:12,fontWeight:600}}>{c.type==="yellow"?"Yellow":"Red"} · {N(CARD_FINE[c.type])}</span>
                                        {c.paid&&<span style={{fontSize:9,color:"#4ade80",fontWeight:700}}>✅</span>}
                                        {c.isManual&&<span style={{fontSize:9,background:"rgba(251,191,36,0.2)",color:"#fbbf24",borderRadius:4,padding:"1px 5px",fontWeight:700}}>MANUAL</span>}
                                      </div>
                                      <div style={{fontSize:11,color:"#fbbf24",fontWeight:600}}>{fmtDate(c.sessionDate||c.date)}</div>
                                    </div>
                                  ))}
                                </div>
                              )}
                            </div>
                          )}
                        </div>
                      );
                    })}

                    {/* Totals footer */}
                    {rows.length>0&&(
                      <div style={{display:"grid",gridTemplateColumns:"1fr 36px 36px 36px 36px 80px",padding:"10px 12px",gap:4,alignItems:"center",background:"rgba(255,255,255,0.05)",borderTop:"2px solid rgba(255,255,255,0.1)"}}>
                        <div style={{fontSize:10,fontWeight:800,color:"#9ca3af",textTransform:"uppercase"}}>Total</div>
                        <div style={{textAlign:"center",fontSize:13,fontWeight:800,color:"#60a5fa"}}>{rows.reduce((s,r)=>s+r.g,0)}</div>
                        <div style={{textAlign:"center",fontSize:13,fontWeight:800,color:"#a78bfa"}}>{rows.reduce((s,r)=>s+r.a,0)}</div>
                        <div style={{textAlign:"center",fontSize:13,fontWeight:800,color:"#fbbf24"}}>{rows.reduce((s,r)=>s+r.y,0)}</div>
                        <div style={{textAlign:"center",fontSize:13,fontWeight:800,color:"#f87171"}}>{rows.reduce((s,r)=>s+r.r,0)}</div>
                        <div style={{textAlign:"center",fontSize:11,fontWeight:800,color:rows.reduce((s,r)=>s+r.totalOwed,0)>0?"#f87171":"#4ade80"}}>{N(rows.reduce((s,r)=>s+r.totalOwed,0))}</div>
                      </div>
                    )}
                  </div>

                  {/* Outstanding fines */}
                  {rows.some(r=>r.hasCards&&!r.allPaid)&&(
                    <div style={{marginTop:12,background:"rgba(239,68,68,0.06)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:12,padding:14}}>
                      <div style={{fontSize:12,fontWeight:700,color:"#f87171",marginBottom:10}}>💳 Outstanding Card Fines</div>
                      {(cards||[]).filter(c=>c&&!c.paid).map(c=>(
                        <div key={c.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",background:c.type==="yellow"?"rgba(251,191,36,0.07)":"rgba(239,68,68,0.07)",border:`1px solid ${c.type==="yellow"?"rgba(251,191,36,0.2)":"rgba(239,68,68,0.2)"}`,borderRadius:8,marginBottom:6}}>
                          <div style={{width:16,height:22,borderRadius:2,background:c.type==="yellow"?"#fbbf24":"#ef4444",flexShrink:0}}/>
                          <div style={{flex:1}}>
                            <div style={{fontSize:13,fontWeight:700}}>{c.playerName}</div>
                            <div style={{fontSize:10,color:"#6b7280"}}>{c.type==="yellow"?"Yellow":"Red"} · {N(CARD_FINE[c.type])} · {new Date((c.sessionDate||c.date)+"T12:00:00").toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"})}</div>
                          </div>
                          <div style={{display:"flex",gap:5}}>
                            <button onClick={()=>markCardPaid(c.id,"cash")} style={{padding:"5px 9px",borderRadius:6,border:"1px solid rgba(251,191,36,0.3)",background:"rgba(251,191,36,0.1)",color:"#fbbf24",cursor:"pointer",fontSize:11,fontWeight:600}}>💵 Cash</button>
                            <button onClick={()=>markCardPaid(c.id,"transfer")} style={{padding:"5px 9px",borderRadius:6,border:"1px solid rgba(74,222,128,0.3)",background:"rgba(74,222,128,0.1)",color:"#4ade80",cursor:"pointer",fontSize:11,fontWeight:600}}>🏦 Bank</button>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              );
            })()}

            {/* ── LOG GOAL ─────────────────────────────────────────────── */}
            <div style={{background:"rgba(96,165,250,0.05)",border:"1px solid rgba(96,165,250,0.18)",borderRadius:14,padding:16,marginBottom:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                    <div style={{fontSize:13,fontWeight:700,color:"#60a5fa"}}>⚽ Log a Goal</div>
                    <button onClick={()=>setManualGoal(m=>!m)} style={{fontSize:10,padding:"4px 10px",borderRadius:6,border:`1px solid ${manualGoal?"rgba(251,191,36,0.5)":"rgba(255,255,255,0.15)"}`,background:manualGoal?"rgba(251,191,36,0.12)":"rgba(255,255,255,0.04)",color:manualGoal?"#fbbf24":"#6b7280",cursor:"pointer",fontWeight:600}}>
                      {manualGoal?"📅 Manual ON":"📅 Manual"}
                    </button>
                  </div>
                  {manualGoal&&(
                    <div style={{marginBottom:10,background:"rgba(251,191,36,0.08)",border:"1px solid rgba(251,191,36,0.2)",borderRadius:8,padding:"10px 12px"}}>
                      <div style={{fontSize:10,color:"#fbbf24",fontWeight:700,marginBottom:6}}>📅 MANUAL ENTRY — Pick the date this goal was scored</div>

                  if(!entries.length)return <div style={{textAlign:"center",color:"#374151",padding:"30px 0",fontSize:13}}>No transactions yet</div>;
                  return entries.map(e=>(
                    <div key={e.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:9,marginBottom:6,background:e.deleted?"rgba(239,68,68,0.04)":"rgba(255,255,255,0.03)",border:`1px solid ${e.deleted?"rgba(239,68,68,0.2)":"rgba(255,255,255,0.07)"}`,opacity:e.deleted?0.6:1}}>
                      <span style={{fontSize:15}}>{e.method==="cash"?"💵":e.method==="transfer"?"🏦":e.method==="expense"?"💸":e.method==="void"?"🚫":"📝"}</span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:12,fontWeight:600,textDecoration:e.deleted?"line-through":"none",color:e.deleted?"#6b7280":"#e8eaf0"}}>{e.note}</div>

                          <span>{e.category}</span>

                        </div>
                      </div>
                      <span style={{fontSize:13,fontWeight:700,color:e.deleted?"#6b7280":e.amount>0?"#4ade80":"#f87171"}}>{e.amount>0?"+":""}{N(e.amount)}</span>
                      {isDev&&e.deleted&&(
                        <button onClick={()=>{
                          if(ledgerRef.current)ledgerRef.current.child(String(e.id)).update({deleted:false}).catch(err=>console.error(err));
                          setLedger(l=>l.map(x=>x&&x.id===e.id?{...x,deleted:false}:x));
                        }} style={{padding:"4px 8px",borderRadius:5,border:"1px solid rgba(74,222,128,0.3)",background:"rgba(74,222,128,0.1)",color:"#4ade80",cursor:"pointer",fontSize:10,fontWeight:700}}>Restore</button>
                      )}
                      {isDev&&(
                        <button onClick={()=>{
                          if(window.confirm("Permanently wipe this entry?")){
                            if(ledgerRef.current)ledgerRef.current.child(String(e.id)).remove().catch(err=>console.error(err));
                            setLedger(l=>l.filter(x=>x&&x.id!==e.id));
                          }
                        }} style={{padding:"4px 8px",borderRadius:5,border:"1px solid rgba(239,68,68,0.3)",background:"rgba(239,68,68,0.1)",color:"#f87171",cursor:"pointer",fontSize:10}}>🗑</button>
                      )}
                    </div>
                  ));
                })()}
              </div>
            )}

            {/* TRAINING EXPENSES */}
            {finView==="expenses"&&(
              <div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>

                {showTxForm&&(
                  <div style={{marginBottom:14}}>
                    <div style={{marginBottom:8}}><Lbl>Description *</Lbl><input value={txDesc} onChange={e=>setTxDesc(e.target.value)} placeholder="e.g. Pitch hire" style={iS}/></div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                      <div><Lbl>Amount (₦) *</Lbl><input type="number" value={txAmt} onChange={e=>setTxAmt(e.target.value)} placeholder="0" style={iS}/></div>
                      <div><Lbl>Date</Lbl><input type="date" value={txDate} onChange={e=>setTxDate(e.target.value)} style={iS}/></div>
                    </div>
                    <div style={{marginBottom:10}}><Lbl>Category</Lbl><select value={txCat} onChange={e=>setTxCat(e.target.value)} style={sS}>{EXP_CATS_TRAINING.map(c=><option key={c}>{c}</option>)}</select></div>

                  <div key={e.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:"rgba(239,68,68,0.05)",border:"1px solid rgba(239,68,68,0.12)",borderRadius:9,marginBottom:6}}>
                    <div style={{flex:1}}><div style={{fontSize:12,fontWeight:600}}>{e.desc}</div><div style={{fontSize:10,color:"#6b7280"}}>{e.category} · {e.date?new Date(e.date+"T12:00:00").toLocaleDateString("en-GB",{day:"numeric",month:"short"}):""}</div></div>

                    <button onClick={()=>{
                      const entry={id:e.id,date:e.date,timestamp:new Date().toISOString(),deleted:true,type:"expense_void",amount:-e.amount,note:`VOID: ${e.desc}`,category:e.category,account:"training",method:"void"};
                      if(ledgerRef.current)ledgerRef.current.child(String(entry.id)+"_void").set(entry).catch(err=>console.error(err));
                      setTrainingExpenses(ex=>ex.filter(x=>x&&x.id!==e.id));
                    }} style={{background:"rgba(239,68,68,0.1)",border:"none",color:"#ef4444",borderRadius:6,padding:"4px 8px",cursor:"pointer",fontSize:11}}>✕</button>
                  </div>
                ))}
                <div style={{background:trainingBal>=0?"rgba(74,222,128,0.08)":"rgba(239,68,68,0.08)",border:`1px solid ${trainingBal>=0?"rgba(74,222,128,0.25)":"rgba(239,68,68,0.25)"}`,borderRadius:12,padding:14,textAlign:"center",marginTop:14}}>
                  <div style={{fontSize:11,color:"#6b7280",fontWeight:700,textTransform:"uppercase",marginBottom:6}}>Training Balance</div>
                  <div style={{fontSize:32,fontWeight:800,color:trainingBal>=0?"#4ade80":"#f87171"}}>{N(trainingBal)}</div>
                </div>
              </div>
            )}
          </div>

        {/* ══ DONATIONS ══ */}
        {tab==="donations"&&(

            {/* Sub nav */}
            <div style={{display:"flex",gap:6,marginBottom:16}}>
              {[["tracker","📊 Tracker"],["expenses","💸 Expenses"],["summary","📋 Summary"]].map(([id,label])=>(

                      if(donorsRef.current)donorsRef.current.child(String(nd.id)).set(nd).catch(e=>console.error(e));
                      setDonors(d=>[...d,nd]);setDonorName("");setShowDonorForm(false);}}}/>

                      const nd={id:Date.now(),name:donorName.trim(),deleted:false};
                      if(donorsRef.current)donorsRef.current.child(String(nd.id)).set(nd).catch(e=>console.error(e));
                      setDonors(d=>[...d,nd]);setDonorName("");setShowDonorForm(false);}} disabled={!donorName.trim()} style={{padding:"9px 16px",borderRadius:8,border:"none",background:donorName.trim()?"linear-gradient(135deg,#92400e,#fbbf24)":"rgba(255,255,255,0.05)",color:donorName.trim()?"#0a0e1a":"#4b5563",fontWeight:800,cursor:donorName.trim()?"pointer":"not-allowed"}}>Add</button>
                    </div>
                  </div>
                )}
                {(donors||[]).length===0&&<div style={{textAlign:"center",color:"#374151",padding:"40px 0",fontSize:13}}>No pioneer members yet</div>}
                {(donors||[]).length>0&&(

                          {MONTHS.map(m=><th key={m} style={{padding:"10px 8px",fontSize:10,color:"#fbbf24",fontWeight:700,textTransform:"uppercase",borderBottom:"1px solid rgba(255,255,255,0.08)",textAlign:"center",minWidth:60}}>{m}</th>)}

                        </tr>
                      </thead>
                      <tbody>
                        {(donors||[]).filter(d=>d&&d.id).map((donor,di)=>(
                          <tr key={donor.id} style={{background:di%2===0?"transparent":"rgba(255,255,255,0.02)"}}>
                            <td style={{padding:"9px 12px",fontSize:13,fontWeight:600,borderBottom:"1px solid rgba(255,255,255,0.05)",position:"sticky",left:0,background:di%2===0?"#0a0e1a":"#0d1220",whiteSpace:"nowrap"}}>
                              <div style={{display:"flex",alignItems:"center",gap:6}}>
                                <div style={{width:24,height:24,borderRadius:"50%",background:"linear-gradient(135deg,#92400e,#fbbf24)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:11,color:"#0a0e1a",flexShrink:0}}>{donor.name.charAt(0).toUpperCase()}</div>
                                {donor.name}
                              </div>
                            </td>
                            {MONTHS.map(month=>{
                              const val=((donations||{})[donor.id]||{})[month]||0;
                              const isEditing=editingCell&&editingCell.donorId===donor.id&&editingCell.month===month;
                              return(
                                <td key={month} style={{padding:"4px",textAlign:"center",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                                  {isEditing?(
                                    <input autoFocus type="number" value={cellValue} onChange={e=>setCellValue(e.target.value)} onBlur={commitEdit} onKeyDown={e=>{if(e.key==="Enter")commitEdit();if(e.key==="Escape"){setEditingCell(null);setCellValue("");}}} style={{width:56,background:"rgba(251,191,36,0.15)",border:"1px solid rgba(251,191,36,0.5)",borderRadius:6,padding:"4px 6px",color:"#fbbf24",fontSize:12,textAlign:"center",outline:"none"}}/>
                                  ):(
                                    <div onClick={()=>startEdit(donor.id,month)} style={{cursor:"pointer",padding:"5px 4px",borderRadius:6,minHeight:28,display:"flex",alignItems:"center",justifyContent:"center",background:val>0?"rgba(74,222,128,0.1)":"rgba(255,255,255,0.03)",border:`1px solid ${val>0?"rgba(74,222,128,0.2)":"rgba(255,255,255,0.06)"}`,fontSize:11,fontWeight:val>0?700:400,color:val>0?"#4ade80":"#374151"}}>
                                      {val>0?`₦${val.toLocaleString()}`:"—"}
                                    </div>
                                  )}
                                </td>
                              );
                            })}
                            <td style={{padding:"9px 10px",textAlign:"center",borderBottom:"1px solid rgba(255,255,255,0.05)",background:"rgba(74,222,128,0.05)"}}>
                              <span style={{fontSize:12,fontWeight:800,color:"#4ade80"}}>₦{donRowTotal(donor.id).toLocaleString()}</span>
                            </td>
                            <td style={{padding:"4px 6px",textAlign:"center",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                              <button onClick={()=>{
                            if(donorsRef.current)donorsRef.current.child(String(donor.id)).update({deleted:true}).catch(e=>console.error(e));
                            setDonors(d=>d.filter(x=>x&&x.id!==donor.id));
                          }} style={{width:24,height:24,borderRadius:5,border:"none",background:"rgba(239,68,68,0.12)",color:"#ef4444",cursor:"pointer",fontSize:11}}>✕</button>
                            </td>
                          </tr>
                        ))}
                        <tr style={{background:"rgba(74,222,128,0.06)",borderTop:"2px solid rgba(74,222,128,0.2)"}}>
                          <td style={{padding:"10px 12px",fontSize:11,fontWeight:800,color:"#4ade80",textTransform:"uppercase",position:"sticky",left:0,background:"rgba(74,222,128,0.08)"}}>Monthly</td>
                          {MONTHS.map(m=><td key={m} style={{padding:"9px 4px",textAlign:"center"}}><span style={{fontSize:11,fontWeight:700,color:donColTotal(m)>0?"#4ade80":"#374151"}}>{donColTotal(m)>0?`₦${donColTotal(m).toLocaleString()}`:"—"}</span></td>)}
                          <td style={{padding:"9px 10px",textAlign:"center",background:"rgba(74,222,128,0.15)"}}><span style={{fontSize:13,fontWeight:800,color:"#4ade80"}}>₦{donGrandTotal.toLocaleString()}</span></td>
                          <td/>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                )}
                {(donors||[]).length>0&&<div style={{marginTop:10,fontSize:11,color:"#4b5563",textAlign:"center"}}>Tap any cell to enter/edit · Press Enter to save</div>}
              </div>

                {showDxForm&&(
                  <div style={{background:"rgba(239,68,68,0.06)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:12,padding:14,marginBottom:14}}>

                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                      <div><Lbl>Amount (₦) *</Lbl><input type="number" value={dxAmt} onChange={e=>setDxAmt(e.target.value)} placeholder="0" style={iS}/></div>
                      <div><Lbl>Date</Lbl><input type="date" value={dxDate} onChange={e=>setDxDate(e.target.value)} style={iS}/></div>
                    </div>
                    <div style={{marginBottom:10}}><Lbl>Category</Lbl><select value={dxCat} onChange={e=>setDxCat(e.target.value)} style={sS}>{EXP_CATS_DONATION.map(c=><option key={c}>{c}</option>)}</select></div>
                    <button onClick={addDonationExpense} disabled={!dxDesc.trim()||!dxAmt} style={{width:"100%",padding:"10px",borderRadius:8,border:"none",background:dxDesc.trim()&&dxAmt?"linear-gradient(135deg,#7f1d1d,#ef4444)":"rgba(255,255,255,0.05)",color:dxDesc.trim()&&dxAmt?"#fff":"#4b5563",fontWeight:800,cursor:dxDesc.trim()&&dxAmt?"pointer":"not-allowed"}}>+ Record Donation Expense</button>
                  </div>
                )}
                {(donationExpenses||[]).filter(e=>e&&e.id).length===0&&!showDxForm&&<div style={{textAlign:"center",color:"#374151",padding:"30px 0"}}>No donation expenses yet</div>}
                {[...(donationExpenses||[])].filter(e=>e&&e.id).reverse().map(e=>(
                  <div key={e.id} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 14px",background:"rgba(239,68,68,0.06)",border:"1px solid rgba(239,68,68,0.15)",borderRadius:10,marginBottom:8}}>
                    <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{e.desc}</div><div style={{fontSize:10,color:"#6b7280"}}>{e.category} · {e.date?new Date(e.date+"T12:00:00").toLocaleDateString("en-GB",{day:"numeric",month:"short"}):""}</div></div>
                    <span style={{fontSize:14,fontWeight:800,color:"#f87171"}}>-{N(e.amount)}</span>
                    <button onClick={()=>{
                    const entry={id:e.id,date:e.date,timestamp:new Date().toISOString(),deleted:true,type:"expense_void",amount:-e.amount,note:`VOID: ${e.desc}`,category:e.category,account:"donation",method:"void"};
                    if(ledgerRef.current)ledgerRef.current.child(String(entry.id)+"_void").set(entry).catch(err=>console.error(err));
                    setDonationExpenses(ex=>ex.filter(x=>x&&x.id!==e.id));
                  }} style={{background:"rgba(239,68,68,0.1)",border:"none",color:"#ef4444",borderRadius:6,padding:"4px 8px",cursor:"pointer",fontSize:11}}>✕</button>
                  </div>
                ))}
                <div style={{background:donationBal>=0?"rgba(74,222,128,0.08)":"rgba(239,68,68,0.08)",border:`1px solid ${donationBal>=0?"rgba(74,222,128,0.25)":"rgba(239,68,68,0.25)"}`,borderRadius:12,padding:14,textAlign:"center",marginTop:14}}>
                  <div style={{fontSize:11,color:"#6b7280",fontWeight:700,textTransform:"uppercase",marginBottom:6}}>Donation Account Balance</div>
                  <div style={{fontSize:32,fontWeight:800,color:donationBal>=0?"#4ade80":"#f87171"}}>{N(donationBal)}</div>
                </div>
              </div>
            )}

            {/* DONATION SUMMARY */}
            {donView==="summary"&&(
              <div>
                <div style={{background:"rgba(251,191,36,0.06)",border:"1px solid rgba(251,191,36,0.2)",borderRadius:14,padding:16,marginBottom:14}}>

                    <span style={{fontSize:13,fontWeight:800,color:"#fbbf24"}}>Total Donated</span>
                    <span style={{fontSize:14,fontWeight:800,color:"#fbbf24"}}>{N(donGrandTotal)}</span>
                  </div>
                </div>
                <div style={{background:"rgba(239,68,68,0.06)",border:"1px solid rgba(239,68,68,0.18)",borderRadius:14,padding:16,marginBottom:14}}>
                  <div style={{fontSize:13,fontWeight:800,color:"#f87171",marginBottom:12}}>Donation Expenses: {N(donationExp)}</div>
                  {(()=>{
                    const byCategory={};

                  {(donationExpenses||[]).length===0&&<div style={{fontSize:12,color:"#374151"}}>No donation expenses yet</div>}

                      {(s.txns||[]).filter(t=>t).map(t=>(
                        <div key={t.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 10px",borderRadius:6,marginBottom:3,background:"rgba(74,222,128,0.04)",border:"1px solid rgba(74,222,128,0.1)",fontSize:12}}>
                          <span style={{color:"#d1d5db"}}>{t.method==="cash"?"💵":t.method==="transfer"?"🏦":t.type==="card_fine"?"🃏":"⏰"} {t.note}</span>
                          <span style={{color:"#4ade80",fontWeight:700}}>+{N(t.amount)}</span>
                        </div>
                      ))}
                    </div>
                  )}

                  {/* ── TRAINING EXPENSES SNAPSHOT ── */}
                  {(s.trainingExpenses||[]).length>0&&(
                    <div style={{background:"rgba(239,68,68,0.05)",border:"1px solid rgba(239,68,68,0.18)",borderRadius:12,padding:14,marginBottom:12}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                        <div style={{fontSize:12,fontWeight:700,color:"#f87171"}}>💸 Training Expenses</div>
                        <div style={{fontSize:13,fontWeight:800,color:"#f87171"}}>{N(tE)}</div>
                      </div>
                      {(s.trainingExpenses||[]).filter(e=>e).map(e=>(
                        <div key={e.id} style={{display:"flex",justifyContent:"space-between",padding:"7px 10px",borderRadius:6,marginBottom:3,background:"rgba(239,68,68,0.04)",border:"1px solid rgba(239,68,68,0.1)",fontSize:12}}>
                          <span style={{color:"#d1d5db"}}>{e.desc} <span style={{color:"#4b5563"}}>({e.category})</span></span>
                          <span style={{color:"#f87171",fontWeight:700}}>-{N(e.amount)}</span>
                        </div>
                      ))}
                      <div style={{borderTop:"1px solid rgba(239,68,68,0.15)",paddingTop:8,marginTop:6,display:"flex",justifyContent:"space-between"}}>
                        <span style={{fontSize:11,fontWeight:700,color:"#9ca3af"}}>Session Net</span>
                        <span style={{fontSize:13,fontWeight:800,color:inc-tE>=0?"#4ade80":"#f87171"}}>{N(inc-tE)}</span>
                      </div>
                    </div>
                  )}

                  {/* ── DONATION EXPENSES SNAPSHOT ── */}
                  {(s.donationExpenses||[]).length>0&&(
                    <div style={{background:"rgba(251,191,36,0.05)",border:"1px solid rgba(251,191,36,0.18)",borderRadius:12,padding:14,marginBottom:12}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                        <div style={{fontSize:12,fontWeight:700,color:"#fbbf24"}}>🤝 Donation Expenses</div>
                        <div style={{fontSize:13,fontWeight:800,color:"#fbbf24"}}>{N((s.donationExpenses||[]).filter(e=>e).reduce((a,e)=>a+(e.amount||0),0))}</div>
                      </div>
                      {(s.donationExpenses||[]).filter(e=>e).map(e=>(
                        <div key={e.id} style={{display:"flex",justifyContent:"space-between",padding:"7px 10px",borderRadius:6,marginBottom:3,background:"rgba(251,191,36,0.04)",border:"1px solid rgba(251,191,36,0.1)",fontSize:12}}>
                          <span style={{color:"#d1d5db"}}>{e.desc} <span style={{color:"#4b5563"}}>({e.category})</span></span>
                          <span style={{color:"#fbbf24",fontWeight:700}}>-{N(e.amount)}</span>
                        </div>
                      ))}
                    </div>
                  )}
                  {/* Goals recap */}
                  {(s.goals||[]).length>0&&(
                    <div style={{background:"rgba(96,165,250,0.05)",border:"1px solid rgba(96,165,250,0.18)",borderRadius:10,padding:12,marginBottom:10}}>
                      <div style={{fontSize:10,color:"#60a5fa",fontWeight:700,textTransform:"uppercase",marginBottom:8}}>⚽ Goals ({(s.goals||[]).length})</div>
                      {(s.goals||[]).map((g,gi)=>(
                        <div key={g.id||gi} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 10px",borderRadius:6,marginBottom:3,background:"rgba(255,255,255,0.03)"}}>
                          <div>
                            <span style={{fontSize:12,fontWeight:700}}>⚽ {g.scorerName}</span>
                            {g.assistName&&<span style={{fontSize:11,color:"#a78bfa"}}> · assist: {g.assistName}</span>}
                            {g.isManual&&<span style={{fontSize:9,background:"rgba(251,191,36,0.2)",color:"#fbbf24",borderRadius:4,padding:"1px 4px",marginLeft:5,fontWeight:700}}>MANUAL</span>}
                          </div>
                          <span style={{fontSize:10,color:"#4ade80"}}>{(()=>{try{return new Date((g.sessionDate||g.date)+"T12:00:00").toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"});}catch(e){return g.sessionDate||g.date||"";}})()}</span>
                        </div>
                      ))}
                    </div>
                  )}

                  {/* Cards recap */}
                  {(s.cards||[]).length>0&&(
                    <div style={{background:"rgba(251,191,36,0.05)",border:"1px solid rgba(251,191,36,0.15)",borderRadius:10,padding:12,marginBottom:10}}>
                      <div style={{fontSize:10,color:"#fbbf24",fontWeight:700,textTransform:"uppercase",marginBottom:8}}>🃏 Cards ({(s.cards||[]).length}) · Fines: {N((s.cards||[]).reduce((a,c)=>a+(CARD_FINE[c.type]||0),0))}</div>
                      {(s.cards||[]).map((c,ci)=>(
                        <div key={c.id||ci} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 10px",borderRadius:6,marginBottom:3,background:c.type==="yellow"?"rgba(251,191,36,0.05)":"rgba(239,68,68,0.05)",border:`1px solid ${c.type==="yellow"?"rgba(251,191,36,0.12)":"rgba(239,68,68,0.12)"}`}}>
                          <div style={{display:"flex",alignItems:"center",gap:6}}>
                            <div style={{width:10,height:14,borderRadius:2,background:c.type==="yellow"?"#fbbf24":"#ef4444",flexShrink:0}}/>
                            <span style={{fontSize:12,fontWeight:700}}>{c.playerName}</span>
                            <span style={{fontSize:10,color:c.type==="yellow"?"#fbbf24":"#f87171"}}>{c.type==="yellow"?"Yellow":"Red"} · {N(CARD_FINE[c.type]||0)}</span>
                            <span style={{fontSize:9,fontWeight:700,color:c.paid?"#4ade80":"#f87171"}}>{c.paid?"✅":"⏳"}</span>
                            {c.isManual&&<span style={{fontSize:9,background:"rgba(251,191,36,0.2)",color:"#fbbf24",borderRadius:4,padding:"1px 4px",fontWeight:700}}>MANUAL</span>}
                          </div>
                          <span style={{fontSize:10,color:"#fbbf24"}}>{(()=>{try{return new Date((c.sessionDate||c.date)+"T12:00:00").toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"});}catch(e){return c.sessionDate||c.date||"";}})()}</span>
                        </div>
                      ))}
                    </div>
                  )}

                  <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:10,padding:12}}>
                    <div style={{fontSize:10,color:"#6b7280",fontWeight:700,textTransform:"uppercase",marginBottom:6}}>Session Notes</div>
                    {isDev&&isEditingThis?<textarea value={s.sessionNote||""} onChange={e=>setSessionHistory(h=>h.map((x,i)=>i===sIdx?{...x,sessionNote:e.target.value}:x))} rows={3} style={{...iS,resize:"vertical",lineHeight:1.6}}/>:<div style={{fontSize:12,color:s.sessionNote?"#9ca3af":"#374151",lineHeight:1.6}}>{s.sessionNote||"No notes"}</div>}
                  </div>
                </div>
              );
            })()}
          </div>
        )}

        {/* ══ ABOUT ══ */}
        {tab==="about"&&(
          <div>
            <div style={{textAlign:"center",marginBottom:24,paddingTop:8}}>
              <img src={SHAS_LOGO} alt="SHAS FC" style={{width:130,height:130,borderRadius:20,objectFit:"cover",margin:"0 auto",display:"block",boxShadow:"0 12px 40px rgba(251,191,36,0.4)",border:"3px solid rgba(251,191,36,0.5)"}}/>
              <div style={{fontSize:22,fontWeight:800,color:"#fbbf24",marginTop:14}}>STATE HOUSING ALL STARS FC</div>
              <div style={{fontSize:12,color:"#6b7280",fontStyle:"italic",marginTop:4}}>For the Love of the Game</div>
              <div style={{display:"flex",justifyContent:"center",gap:8,marginTop:12,flexWrap:"wrap"}}>
                <span style={{fontSize:11,background:"rgba(251,191,36,0.12)",color:"#fbbf24",borderRadius:20,padding:"4px 12px",fontWeight:700}}>📍 Calabar, Nigeria</span>
                <span style={{fontSize:11,background:"rgba(74,222,128,0.12)",color:"#4ade80",borderRadius:20,padding:"4px 12px",fontWeight:700}}>🗓 Est. 2015</span>
                <span style={{fontSize:11,background:"rgba(96,165,250,0.12)",color:"#60a5fa",borderRadius:20,padding:"4px 12px",fontWeight:700}}>⚽ 6-a-Side</span>
              </div>
            </div>
            <div style={{background:"rgba(74,222,128,0.06)",border:"1px solid rgba(74,222,128,0.18)",borderRadius:14,padding:18,marginBottom:14}}>
              <div style={{fontSize:12,fontWeight:800,color:"#4ade80",textTransform:"uppercase",marginBottom:10}}>🏆 Our Story</div>
              <p style={{fontSize:13,color:"#d1d5db",lineHeight:1.8}}>Founded in 2015 by Banny and Friends, SHAS FC was born out of a shared passion for football in Calabar, Nigeria. A grassroots veteran club open to youngsters too — because football has no age limit.</p>
            </div>
            <div style={{background:"rgba(96,165,250,0.06)",border:"1px solid rgba(96,165,250,0.18)",borderRadius:14,padding:18,marginBottom:14}}>
              <div style={{fontSize:12,fontWeight:800,color:"#60a5fa",textTransform:"uppercase",marginBottom:14}}>📅 Training Days</div>
              {[{day:"Wednesday",icon:"🟢",note:"Weekly"},{day:"Friday",icon:"🟢",note:"Weekly"},{day:"Saturday",icon:"🟢",note:"Weekly"},{day:"Public Holidays",icon:"🔵",note:"Arranged public holidays"}].map(t=>(
                <div key={t.day} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",borderRadius:10,marginBottom:8,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)"}}>
                  <span style={{fontSize:18}}>{t.icon}</span>
                  <div><div style={{fontSize:14,fontWeight:700,color:"#fff"}}>{t.day}</div><div style={{fontSize:11,color:"#6b7280",marginTop:2}}>{t.note}</div></div>
                </div>
              ))}
              <div style={{fontSize:11,color:"#4b5563",marginTop:6,fontStyle:"italic"}}>Venue: State Housing Estate, Calabar</div>
            </div>
            <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:14,padding:18,marginBottom:20}}>
              <div style={{fontSize:12,fontWeight:800,color:"#9ca3af",textTransform:"uppercase",marginBottom:12}}>📞 Contact</div>
              <a href="mailto:shascalabar@gmail.com" style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:"rgba(96,165,250,0.06)",border:"1px solid rgba(96,165,250,0.18)",borderRadius:10,textDecoration:"none"}}>
                <span style={{fontSize:22}}>✉️</span>
                <div><div style={{fontSize:13,fontWeight:700,color:"#60a5fa"}}>Club Email</div><div style={{fontSize:12,color:"#6b7280"}}>shascalabar@gmail.com</div></div>
              </a>
            </div>
            <div style={{background:"#000",border:"2px solid rgba(251,191,36,0.5)",borderRadius:16,padding:24,textAlign:"center"}}>
              <div style={{fontSize:10,color:"#fbbf24",fontWeight:700,textTransform:"uppercase",letterSpacing:"2px",marginBottom:16}}>Powered by</div>
              <img src={DAAB_LOGO} alt="DAAB EDGE INNOVATION LIMITED" style={{width:160,height:110,objectFit:"contain",margin:"0 auto 14px",display:"block",borderRadius:8}}/>
              <div style={{fontSize:10,color:"#4b5563",marginBottom:14,fontStyle:"italic"}}>Building smart tools for grassroots football</div>
              <a href="mailto:daab.edge@gmail.com" style={{display:"inline-flex",alignItems:"center",gap:8,padding:"9px 20px",background:"rgba(74,222,128,0.12)",border:"1px solid rgba(74,222,128,0.3)",borderRadius:20,textDecoration:"none",color:"#4ade80",fontSize:12,fontWeight:700}}>✉️ daab.edge@gmail.com</a>
              <div style={{fontSize:10,color:"#374151",marginTop:12}}>© 2025 DAAB EDGE INNOVATIONS · All rights reserved</div>
            </div>
          </div>
        )}

      </div>

      {/* Footer */}
      <div style={{textAlign:"center",padding:"22px 16px 30px",borderTop:"1px solid rgba(255,255,255,0.06)",marginTop:10,display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
        <img src={DAAB_LOGO} alt="DAAB EDGE" style={{width:80,height:56,objectFit:"contain",borderRadius:6}}/>
        <div>
          <div style={{fontSize:11,fontWeight:800,color:"#fbbf24",marginBottom:2}}>DAAB EDGE INNOVATION LIMITED</div>
          <a href="mailto:daab.edge@gmail.com" style={{fontSize:11,color:"#6b7280",textDecoration:"none"}}>✉️ daab.edge@gmail.com</a>
        </div>
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(ErrorBoundary,null,React.createElement(App)));
</script>
</body>
</html>

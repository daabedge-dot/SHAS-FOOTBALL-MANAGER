// ── Error Boundary ─────────────────────────────────────────────────────
class ErrorBoundary extends Component {
  constructor(p){super(p);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(e){return{hasError:true,error:e};}
  render(){
    if(!this.state.hasError)return this.props.children;
    return(
      <div style={{minHeight:"100vh",background:"#0a0e1a",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
        <div style={{background:"#111827",border:"1px solid rgba(239,68,68,0.3)",borderRadius:16,padding:28,maxWidth:440,width:"100%"}}>
          <div style={{fontSize:36,marginBottom:12}}>⚠️</div>
          <div style={{fontSize:18,fontWeight:800,color:"#f87171",marginBottom:8}}>App Error</div>
          <div style={{background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:10,padding:12,marginBottom:16,fontFamily:"monospace",fontSize:11,color:"#f87171",wordBreak:"break-all"}}>{this.state.error?.message}</div>
          <button onClick={()=>window.location.reload()} style={{width:"100%",padding:"12px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#1d4ed8,#60a5fa)",color:"#fff",fontWeight:800,cursor:"pointer",fontSize:13}}>🔄 Reload</button>
        </div>
      </div>
    );
  }
}

// ── Constants ──────────────────────────────────────────────────────────

const toArr=v=>{if(!v)return[];const a=Array.isArray(v)?v:Object.values(v);return a.filter(x=>x!=null);};

// ── ADMIN LOGIN SCREEN ─────────────────────────────────────────────────
function LoginScreen({onLogin}){
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);

  const login=async()=>{
    if(!email||!pass)return;
    setLoading(true);setErr("");
    try{
      await firebase.auth().signInWithEmailAndPassword(email,pass);
      onLogin();
    }catch(e){
      setErr("Incorrect email or password");
    }finally{setLoading(false);}
  };

  return(
    <div style={{minHeight:"100vh",background:"#0a0e1a",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{width:"100%",maxWidth:380}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{width:80,height:80,borderRadius:20,background:"linear-gradient(135deg,#065f46,#4ade80)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:40,margin:"0 auto 16px"}}>⚽</div>
          <div style={{fontSize:22,fontWeight:800,color:"#fbbf24"}}>SHAS FC Manager</div>
          <div style={{fontSize:12,color:"#6b7280",marginTop:4}}>Admin Access Only</div>
        </div>
        <div style={{background:"#111827",border:"1px solid rgba(255,255,255,0.1)",borderRadius:16,padding:24}}>
          <div style={{marginBottom:14}}>
            <Lbl>Email</Lbl>
            <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="admin@email.com" style={iS} type="email" autoComplete="email" onKeyDown={e=>e.key==="Enter"&&login()}/>
          </div>
          <div style={{marginBottom:20}}>
            <Lbl>Password</Lbl>
            <input value={pass} onChange={e=>setPass(e.target.value)} placeholder="Password" style={iS} type="password" autoComplete="current-password" onKeyDown={e=>e.key==="Enter"&&login()}/>
          </div>
          {err&&<div style={{fontSize:12,color:"#f87171",marginBottom:14,padding:"8px 12px",background:"rgba(239,68,68,0.1)",borderRadius:8}}>❌ {err}</div>}
          <button onClick={login} disabled={loading||!email||!pass} style={{width:"100%",padding:"13px",borderRadius:10,border:"none",background:email&&pass?"linear-gradient(135deg,#1d4ed8,#60a5fa)":"rgba(255,255,255,0.06)",color:email&&pass?"#fff":"#4b5563",fontWeight:800,cursor:email&&pass?"pointer":"not-allowed",fontSize:14}}>
            {loading?"Signing in...":"🔐 Sign In"}
          </button>
        </div>
        <div style={{textAlign:"center",marginTop:16,fontSize:11,color:"#374151"}}>
          State Housing All Stars FC · Calabar, Nigeria
        </div>
      </div>
    </div>
  );
}

// ── MAIN APP ────────────────────────────────────────────────────────────
function App(){
  const today=new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"});

  // Auth state
  const [isAdmin,setIsAdmin]=useState(false);
  const [isDev,setIsDev]=useState(false);
  const [authChecked,setAuthChecked]=useState(false);

  // Session
  const [tab,setTab]=useState("session");
  const [sessionType,setSessionType]=useState("Wednesday");
  const [sessionDate,setSessionDate]=useState(new Date().toISOString().slice(0,10));

  // Set timer
  const [setDuration,setSetDuration]=useState(15);
  const [swSecs,setSwSecs]=useState(0);
  const [swOn,setSwOn]=useState(false);
  const [swFinished,setSwFinished]=useState(false);
  const [teamA,setTeamA]=useState("Set 1");
  const [teamB,setTeamB]=useState("Set 2");
  const [showPK,setShowPK]=useState(false);
  const [setLog,setSetLog]=useState([]);
  const swRef=useRef(null);

  // Members & squad
  const [members,setMembers]=useState([]);
  const [mName,setMName]=useState("");
  const [showMForm,setShowMForm]=useState(false);
  const [players,setPlayers]=useState([]);
  const [pName,setPName]=useState("");
  const [showPForm,setShowPForm]=useState(false);
  const [playerSets,setPlayerSets]=useState({});

  // Match
  const [goals,setGoals]=useState([]);
  const [gScorer,setGScorer]=useState("");
  const [gAssist,setGAssist]=useState("");
  const [cards,setCards]=useState([]);
  const [cName,setCName]=useState("");
  const [cType,setCType]=useState("yellow");

  // Payments
  const [txns,setTxns]=useState([]);
  const [payModal,setPayModal]=useState(null);
  const [copiedField,setCopied]=useState(null);
  const [showGroupForm,setShowGroupForm]=useState(false);
  const [groupPayer,setGroupPayer]=useState("");
  const [groupCovered,setGroupCovered]=useState([]);
  const [groupMethod,setGroupMethod]=useState("cash");
  const [showLateForm,setShowLateForm]=useState(false);
  const [latePlayer,setLatePlayer]=useState("");
  const [lateMethod,setLateMethod]=useState("cash");

  // ── TRAINING EXPENSES ─────────────────────────────────────────────
  const [trainingExpenses,setTrainingExpenses]=useState([]);
  const [txDesc,setTxDesc]=useState("");
  const [txAmt,setTxAmt]=useState("");
  const [txCat,setTxCat]=useState("Pitch Hire");
  const [txDate,setTxDate]=useState(new Date().toISOString().slice(0,10));
  const [showTxForm,setShowTxForm]=useState(false);

  // ── DONATION ACCOUNT ──────────────────────────────────────────────
  const [donors,setDonors]=useState([]);
  const [donations,setDonations]=useState({});
  const [donorName,setDonorName]=useState("");
  const [showDonorForm,setShowDonorForm]=useState(false);
  const [donYear,setDonYear]=useState(new Date().getFullYear());
  const [editingCell,setEditingCell]=useState(null);
  const [cellValue,setCellValue]=useState("");

  // ── DONATION EXPENSES ─────────────────────────────────────────────
  const [donationExpenses,setDonationExpenses]=useState([]);
  const [dxDesc,setDxDesc]=useState("");
  const [dxAmt,setDxAmt]=useState("");
  const [dxCat,setDxCat]=useState("Club Kit");
  const [dxDate,setDxDate]=useState(new Date().toISOString().slice(0,10));
  const [showDxForm,setShowDxForm]=useState(false);

  // Notes
  const [sessionNote,setSessionNote]=useState("");
  const [pNotes,setPNotes]=useState({});

  // History
  const [sessionHistory,setSessionHistory]=useState([]);
  const [ledger,setLedger]=useState([]);
  const [viewingSession,setViewingSession]=useState(null);
  const [editingHistoryId,setEditingHistoryId]=useState(null);

  // Finance view
  const [finView,setFinView]=useState("overview");
  const [donView,setDonView]=useState("tracker");

  // Sync
  const [syncStatus,setSyncStatus]=useState("connecting");
  const [syncPulse,setSyncPulse]=useState(false);
  const [firebaseError,setFirebaseError]=useState(null);
  const DEV_EMAIL = "daab.edge@gmail.com";
  const isRemoteUpdate=useRef(false);
  const dbRef=useRef(null);
  const membersRef=useRef(null);
  const goalsRef=useRef(null);
  const cardsRef=useRef(null);
  const ledgerRef=useRef(null);
  const historyRef=useRef(null);
  const donorsRef=useRef(null);
  const donationsRef=useRef(null);

  // Report
  const [dlFilter,setDlFilter]=useState("all");
  const [dlDate,setDlDate]=useState(new Date().toISOString().slice(0,10));
  const [dlCount,setDlCount]=useState(3);
  const [dlMonth,setDlMonth]=useState(new Date().getMonth());
  const [emailTo,setEmailTo]=useState("");

  // ── AUTH LISTENER ───────────────────────────────────────────────────
  useEffect(()=>{
    const unsub=firebase.auth().onAuthStateChanged(user=>{
      setIsAdmin(!!user);
      setIsDev(!!(user&&user.email===DEV_EMAIL));
      setAuthChecked(true);
    });
    return()=>unsub();
  },[]);

  // ── SET TIMER ───────────────────────────────────────────────────────
  useEffect(()=>{
    if(swOn){
      swRef.current=setInterval(()=>{
        setSwSecs(s=>{
          const next=s+1;
          if(next>=setDuration*60){
            clearInterval(swRef.current);setSwOn(false);setSwFinished(true);
            try{
              const ctx=new(window.AudioContext||window.webkitAudioContext)();
              const b=(f,st,d)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f;o.type="square";g.gain.setValueAtTime(.3,ctx.currentTime+st);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+st+d);o.start(ctx.currentTime+st);o.stop(ctx.currentTime+st+d+.1);};
              b(880,0,.3);b(880,.35,.3);b(880,.7,.3);b(1100,1.1,.6);
            }catch(e){}
            if(navigator.vibrate)navigator.vibrate([300,100,300,100,600]);
            return next;
          }
          return next;
        });
      },1000);
    }else clearInterval(swRef.current);
    return()=>clearInterval(swRef.current);
  },[swOn,setDuration]);

  const resetSw=()=>{setSwSecs(0);setSwOn(false);setSwFinished(false);setShowPK(false);};
  const logSet=(result,winner)=>{
    setSetLog(l=>[...l,{id:Date.now(),setNum:l.length+1,teamA,teamB,duration:swSecs,result,winner}]);
    setTeamA(winner);setTeamB("Set "+(setLog.length+2));resetSw();
  };

  // ── FIREBASE SYNC ────────────────────────────────────────────────────
  useEffect(()=>{
    if(!authChecked||!isAdmin)return;
    if(!window._fbReady){setSyncStatus("error");setFirebaseError("Firebase failed to initialize.");return;}
    let r;
    try{r=window._fbDb.ref("session");dbRef.current=r;}
    catch(e){setSyncStatus("error");setFirebaseError("Cannot connect: "+e.message);return;}

    window._fbDb.ref(".info/connected").on("value",snap=>{
      setSyncStatus(snap.val()?"live":"error");
      if(snap.val())setFirebaseError(null);
    });
    r.on("value",snap=>{
      setSyncStatus("live");setFirebaseError(null);
      const data=snap.val();
      if(!data)return;
      isRemoteUpdate.current=true;
      setSyncPulse(true);setTimeout(()=>setSyncPulse(false),600);
      setTimeout(()=>{isRemoteUpdate.current=false;},2000);
      setPlayers(toArr(data.players));
      setTxns(toArr(data.txns));
      setTrainingExpenses(toArr(data.trainingExpenses));
      setDonationExpenses(toArr(data.donationExpenses));
      setPlayerSets(data.playerSets||{});
      setPNotes(data.pNotes||{});
      if(data.sessionType)setSessionType(data.sessionType);
      if(data.sessionDate)setSessionDate(data.sessionDate);
      setSessionNote(data.sessionNote||"");
      setDonors(toArr(data.donors));
      setDonations(data.donations&&typeof data.donations==="object"?data.donations:{});
      setSetLog(toArr(data.setLog));
      if(data.teamA)setTeamA(data.teamA);
      if(data.teamB)setTeamB(data.teamB);
      if(data.setDuration)setSetDuration(data.setDuration);
      if(data.swSecs!=null)setSwSecs(data.swSecs);
      if(data.swFinished!=null)setSwFinished(data.swFinished);
      const rawH=toArr(data.sessionHistory);
      setSessionHistory(rawH.map(s=>({...s,players:toArr(s.players),goals:toArr(s.goals),cards:toArr(s.cards),txns:toArr(s.txns),trainingExpenses:toArr(s.trainingExpenses),donationExpenses:toArr(s.donationExpenses),playerSets:s.playerSets||{},pNotes:s.pNotes||{}})));
    },err=>{
      setSyncStatus("error");
      setFirebaseError("Firebase Rules Error: "+err.message+". Set rules to allow admin read/write.");
    });
    return()=>r.off();
  },[authChecked,isAdmin]);

  // ── PERMANENT MEMBERS LISTENER ────────────────────────────────────────────
  useEffect(()=>{
    if(!authChecked||!isAdmin||!window._fbReady)return;
    const mr=window._fbDb.ref("club_members");
    membersRef.current=mr;
    mr.on("value",snap=>{
      const data=snap.val();
      if(!data){setMembers([]);return;}
      const arr=Array.isArray(data)?data:Object.values(data);
      setMembers(arr.filter(x=>x!=null&&x.id!=null));
    },err=>{console.error("Members read error:",err);});
    return()=>mr.off();
  },[authChecked,isAdmin]);

  // ── PERMANENT GOALS LISTENER ────────────────────────────────────────────────
  useEffect(()=>{
    if(!authChecked||!isAdmin||!window._fbReady)return;
    const gr=window._fbDb.ref("match_goals");
    goalsRef.current=gr;
    gr.on("value",snap=>{
      const data=snap.val();
      if(!data){setGoals([]);return;}
      const arr=Array.isArray(data)?data:Object.values(data);
      setGoals(arr.filter(x=>x!=null&&x.id!=null));

    return()=>gr.off();
  },[authChecked,isAdmin]);

  // ── PERMANENT CARDS LISTENER ────────────────────────────────────────────────
  useEffect(()=>{
    if(!authChecked||!isAdmin||!window._fbReady)return;
    const cr=window._fbDb.ref("match_cards");
    cardsRef.current=cr;

  // ── PERMANENT FINANCE LEDGER ─────────────────────────────────────────────

    ledgerRef.current=lr;
    lr.on("value",snap=>{
      const data=snap.val();
      if(!data){setLedger([]);return;}
      const arr=Array.isArray(data)?data:Object.values(data);
      setLedger(arr.filter(x=>x!=null&&x.id!=null));
    },err=>{console.error("Ledger read error:",err);});
    return()=>lr.off();
  },[authChecked,isAdmin]);

  // ── PERMANENT SESSION HISTORY ────────────────────────────────────────────
  useEffect(()=>{
    if(!authChecked||!isAdmin||!window._fbReady)return;
    const hr=window._fbDb.ref("club_history");
    historyRef.current=hr;
    hr.on("value",snap=>{
      const data=snap.val();
      if(!data){setSessionHistory([]);return;}
      const arr=Array.isArray(data)?data:Object.values(data);
      setSessionHistory(arr.filter(x=>x!=null&&x.id!=null).map(s=>({
        ...s,
        players:toArr(s.players),goals:toArr(s.goals),cards:toArr(s.cards),
        txns:toArr(s.txns),trainingExpenses:toArr(s.trainingExpenses),
        donationExpenses:toArr(s.donationExpenses),
        playerSets:s.playerSets||{},pNotes:s.pNotes||{}
      })));
    },err=>{console.error("History read error:",err);});
    return()=>hr.off();
  },[authChecked,isAdmin]);

  // ── PERMANENT DONORS ─────────────────────────────────────────────────────
  useEffect(()=>{
    if(!authChecked||!isAdmin||!window._fbReady)return;
    const dr=window._fbDb.ref("club_donors");
    donorsRef.current=dr;
    dr.on("value",snap=>{
      const data=snap.val();
      if(!data){setDonors([]);return;}

            <div style={{marginBottom:16}}><Lbl>Date</Lbl><input type="date" value={sessionDate} onChange={e=>setSessionDate(e.target.value)} style={iS}/></div>

            {/* Set timer */}
            <div style={{background:"linear-gradient(135deg,rgba(74,222,128,0.06),rgba(16,185,129,0.03))",border:"1px solid rgba(74,222,128,0.18)",borderRadius:16,padding:18,marginBottom:16}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                <div style={{fontSize:13,fontWeight:700,color:"#4ade80"}}>⏱ Set Timer</div>
                <div style={{fontSize:11,color:"#6b7280"}}>Set {setLog.length+1}</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 28px 1fr",gap:6,alignItems:"center",marginBottom:14}}>
                <input value={teamA} onChange={e=>setTeamA(e.target.value)} style={{...iS,textAlign:"center",fontWeight:800,fontSize:13,color:"#60a5fa",background:"rgba(96,165,250,0.1)",borderColor:"rgba(96,165,250,0.3)"}}/>
                <div style={{textAlign:"center",fontSize:12,fontWeight:800,color:"#6b7280"}}>vs</div>
                <input value={teamB} onChange={e=>setTeamB(e.target.value)} style={{...iS,textAlign:"center",fontWeight:800,fontSize:13,color:"#f87171",background:"rgba(239,68,68,0.1)",borderColor:"rgba(239,68,68,0.3)"}}/>
              </div>
              {!swOn&&!swFinished&&(
                <div style={{marginBottom:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:11,color:"#6b7280",fontWeight:600}}>Duration: <span style={{color:"#4ade80",fontWeight:800}}>{setDuration} min</span></span></div>
                  <input type="range" min={1} max={45} value={setDuration} onChange={e=>setSetDuration(Number(e.target.value))} style={{width:"100%",accentColor:"#4ade80",cursor:"pointer"}}/>
                </div>
              )}
              <div style={{textAlign:"center",marginBottom:14}}>
                <div style={{fontSize:10,fontWeight:700,letterSpacing:"1px",textTransform:"uppercase",marginBottom:6,color:swFinished?"#f87171":"#4ade80"}}>{swFinished?"⏰ FULL TIME!":swOn?`${teamA} vs ${teamB}`:swSecs>0?"PAUSED":`${setDuration} MIN SET`}</div>
                <div style={{fontSize:60,fontWeight:800,letterSpacing:"-3px",color:swFinished?"#f87171":"#fff",fontVariantNumeric:"tabular-nums",lineHeight:1}}>{fmt(swSecs)}</div>
                <div style={{marginTop:10}}>
                  <div style={{height:6,background:"rgba(255,255,255,0.07)",borderRadius:3,overflow:"hidden"}}>
                    <div style={{height:"100%",borderRadius:3,background:swFinished?"#ef4444":"linear-gradient(90deg,#16a34a,#4ade80)",width:`${Math.min(100,(swSecs/(setDuration*60))*100)}%`,transition:"width 1s linear"}}/>
                  </div>
                  <div style={{fontSize:11,color:"#6b7280",marginTop:4}}>{swFinished?"Full time":fmt(Math.max(0,setDuration*60-swSecs))+" remaining"}</div>
                </div>
              </div>
              {!swFinished&&(
                <div style={{display:"flex",gap:8,marginBottom:swOn?10:0}}>
                  <button onClick={()=>setSwOn(r=>!r)} style={{flex:1,padding:"11px",borderRadius:9,border:"none",background:swOn?"rgba(239,68,68,0.2)":"linear-gradient(135deg,#16a34a,#4ade80)",color:swOn?"#ef4444":"#0a0e1a",fontWeight:800,cursor:"pointer",fontSize:14}}>{swOn?"⏸ Pause":swSecs===0?"▶ Start Set":"▶ Resume"}</button>
                  <button onClick={resetSw} style={{padding:"11px 16px",borderRadius:9,border:"1px solid rgba(255,255,255,0.1)",background:"transparent",color:"#6b7280",cursor:"pointer",fontSize:13}}>↺</button>
                </div>
              )}
              {swOn&&<button onClick={()=>{setSwOn(false);setSwFinished(true);}} style={{width:"100%",padding:"10px",borderRadius:9,border:"none",background:"linear-gradient(135deg,#1d4ed8,#60a5fa)",color:"#fff",fontWeight:800,cursor:"pointer",fontSize:13,marginTop:6}}>⚽ Goal Scored — End Set</button>}
              {swFinished&&!showPK&&(
                <div style={{marginTop:4}}>
                  <div style={{fontSize:11,color:"#6b7280",textAlign:"center",marginBottom:10}}>Who won?</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                    <button onClick={()=>logSet("goal",teamA)} style={{padding:"12px 8px",borderRadius:9,border:"1px solid rgba(96,165,250,0.4)",background:"rgba(96,165,250,0.15)",color:"#60a5fa",fontWeight:800,cursor:"pointer",fontSize:13}}>⚽ {teamA}</button>
                    <button onClick={()=>logSet("goal",teamB)} style={{padding:"12px 8px",borderRadius:9,border:"1px solid rgba(239,68,68,0.4)",background:"rgba(239,68,68,0.15)",color:"#f87171",fontWeight:800,cursor:"pointer",fontSize:13}}>⚽ {teamB}</button>
                  </div>
                  <button onClick={()=>setShowPK(true)} style={{width:"100%",padding:"10px",borderRadius:9,border:"1px solid rgba(251,191,36,0.4)",background:"rgba(251,191,36,0.1)",color:"#fbbf24",fontWeight:800,cursor:"pointer",fontSize:13}}>🥅 Penalties (PK)</button>
                </div>
              )}
              {swFinished&&showPK&&(
                <div style={{marginTop:4}}>
                  <div style={{fontSize:11,color:"#fbbf24",textAlign:"center",marginBottom:10,fontWeight:700}}>🥅 PK — Who wins?</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                    <button onClick={()=>logSet("pk",teamA)} style={{padding:"12px 8px",borderRadius:9,border:"1px solid rgba(96,165,250,0.4)",background:"rgba(96,165,250,0.15)",color:"#60a5fa",fontWeight:800,cursor:"pointer",fontSize:13}}>🥅 {teamA}</button>
                    <button onClick={()=>logSet("pk",teamB)} style={{padding:"12px 8px",borderRadius:9,border:"1px solid rgba(239,68,68,0.4)",background:"rgba(239,68,68,0.15)",color:"#f87171",fontWeight:800,cursor:"pointer",fontSize:13}}>🥅 {teamB}</button>
                  </div>
                  <button onClick={()=>setShowPK(false)} style={{width:"100%",marginTop:8,padding:"8px",borderRadius:9,border:"1px solid rgba(255,255,255,0.1)",background:"transparent",color:"#6b7280",cursor:"pointer",fontSize:12}}>← Back</button>
                </div>
              )}
            </div>

            {setLog.filter(s=>s&&s.id).length>0&&(
              <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:14,padding:14,marginBottom:16}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div style={{fontSize:12,fontWeight:700}}>📋 Sets <span style={{background:"rgba(255,255,255,0.08)",color:"#9ca3af",borderRadius:6,padding:"1px 8px",fontSize:11,marginLeft:4}}>{setLog.length}</span></div>
                  <div style={{fontSize:11,color:"#6b7280"}}>Total: {fmt(setLog.filter(s=>s).reduce((s,x)=>s+x.duration,0))}</div>
                </div>
                {setLog.filter(s=>s&&s.id).map((s,i)=>(
                  <div key={s.id} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 10px",borderRadius:9,marginBottom:6,background:i%2===0?"rgba(255,255,255,0.02)":"transparent",border:"1px solid rgba(255,255,255,0.05)"}}>
                    <div style={{width:26,height:26,borderRadius:"50%",background:"linear-gradient(135deg,#1d4ed8,#60a5fa)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:11,color:"#fff",flexShrink:0}}>{s.setNum}</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:12,fontWeight:700}}>{s.teamA} <span style={{color:"#4b5563"}}>vs</span> {s.teamB}</div>
                      <div style={{fontSize:10,color:"#6b7280"}}>{s.result==="pk"?"🥅 PK":"⚽ Goal"} · <span style={{color:"#4ade80",fontWeight:700}}>{s.winner} wins</span></div>
                    </div>
                    <div style={{fontSize:13,fontWeight:800,color:"#fbbf24"}}>{fmt(s.duration)}</div>
                    <button onClick={()=>setSetLog(l=>l.filter(x=>x&&x.id!==s.id))} style={{width:24,height:24,borderRadius:5,border:"none",background:"rgba(239,68,68,0.1)",color:"#ef4444",cursor:"pointer",fontSize:11}}>✕</button>
                  </div>
                ))}
              </div>
            )}

            <div style={{background:"linear-gradient(135deg,rgba(239,68,68,0.08),rgba(251,191,36,0.05))",border:"1px solid rgba(239,68,68,0.2)",borderRadius:14,padding:16}}>
              <div style={{fontSize:13,fontWeight:700,color:"#f87171",marginBottom:4}}>📅 End & Save Session</div>
              <div style={{fontSize:11,color:"#6b7280",marginBottom:12}}>Archives this session and clears squad for next day.</div>
              <button onClick={()=>{
                if((players||[]).length===0&&(goals||[]).length===0&&(txns||[]).length===0){alert("Nothing to save!");return;}
                if(!window.confirm(`Save "${sessionType}" session on ${sessionDate}?`))return;
                const archived={id:Date.now(),sessionType,sessionDate,players:[...(players||[])],playerSets:{...playerSets},goals:[...(goals||[])],cards:[...(cards||[])],txns:[...(txns||[])],trainingExpenses:[...(trainingExpenses||[])],donationExpenses:[...(donationExpenses||[])],sessionNote,pNotes:{...pNotes},setLog:[...(setLog||[])],savedAt:new Date().toISOString(),deleted:false};
                if(historyRef.current){
                  historyRef.current.child(String(archived.id)).set(archived)
                    .catch(e=>console.error("History save failed:",e));
                }
                setSessionHistory(h=>[...h,archived]);
                setPlayers([]);setPlayerSets({});setSessionNote("");setPNotes({});setSetLog([]);
                setTeamA("Set 1");setTeamB("Set 2");resetSw();
                setSessionDate(new Date().toISOString().slice(0,10));setSessionType("Wednesday");
                alert("✅ Session saved! Squad cleared for next session.");
              }} style={{width:"100%",padding:"14px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#7f1d1d,#ef4444)",color:"#fff",fontWeight:800,fontSize:14,cursor:"pointer"}}>💾 End Session & Start New Day</button>
            </div>
          </div>
        )}

        {/* ══ MEMBERS ══ */}
        {tab==="members"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{fontSize:13,color:"#6b7280"}}>{(members||[]).length} registered members</div>
              <button onClick={()=>setShowMForm(f=>!f)} style={{fontSize:11,padding:"6px 12px",borderRadius:7,border:`1px solid ${showMForm?"rgba(239,68,68,0.4)":"rgba(167,139,250,0.4)"}`,background:showMForm?"rgba(239,68,68,0.1)":"rgba(167,139,250,0.1)",color:showMForm?"#f87171":"#a78bfa",cursor:"pointer",fontWeight:600}}>{showMForm?"✕ Cancel":"+ Add Member"}</button>
            </div>
            {showMForm&&(
              <div onClick={e=>e.stopPropagation()} style={{background:"rgba(167,139,250,0.06)",border:"1px solid rgba(167,139,250,0.2)",borderRadius:12,padding:14,marginBottom:14}}>
                <Lbl c="#a78bfa">New Member</Lbl>
                <div style={{display:"flex",gap:8,marginTop:6}}>
                  <input value={mName} onChange={e=>setMName(e.target.value)} placeholder="Full name" style={{...iS,flex:1}} onKeyDown={e=>e.key==="Enter"&&addMember()}/>
                  <button onClick={addMember} disabled={!mName.trim()} style={{padding:"9px 16px",borderRadius:8,border:"none",background:mName.trim()?"linear-gradient(135deg,#6d28d9,#a78bfa)":"rgba(255,255,255,0.05)",color:mName.trim()?"#fff":"#4b5563",fontWeight:800,cursor:mName.trim()?"pointer":"not-allowed"}}>Add</button>
                </div>
              </div>
            )}
            {(members||[]).filter(m=>m&&m.id).map(m=>(
              <div key={m.id} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 14px",borderRadius:10,marginBottom:7,background:"rgba(167,139,250,0.06)",border:"1px solid rgba(167,139,250,0.15)"}}>
                <div style={{width:34,height:34,borderRadius:"50%",background:"linear-gradient(135deg,#6d28d9,#a78bfa)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:14,color:"#fff",flexShrink:0}}>{m.name.charAt(0).toUpperCase()}</div>
                <div style={{flex:1}}><div style={{fontWeight:600,fontSize:14}}>{m.name}</div><div style={{fontSize:10,color:"#a78bfa",fontWeight:600}}>REGISTERED MEMBER</div></div>
                <button onClick={()=>addMemberToSession(m)} style={{padding:"6px 10px",borderRadius:7,border:`1px solid ${(players||[]).find(p=>p&&p.name&&m.name&&p.name.toLowerCase()===m.name.toLowerCase())?"rgba(74,222,128,0.4)":"rgba(255,255,255,0.1)"}`,background:(players||[]).find(p=>p&&p.name&&m.name&&p.name.toLowerCase()===m.name.toLowerCase())?"rgba(74,222,128,0.15)":"rgba(255,255,255,0.04)",color:(players||[]).find(p=>p&&p.name&&m.name&&p.name.toLowerCase()===m.name.toLowerCase())?"#4ade80":"#9ca3af",cursor:"pointer",fontSize:11,fontWeight:600}}>{(players||[]).find(p=>p&&p.name&&m.name&&p.name.toLowerCase()===m.name.toLowerCase())?"✓ Added":"+ Session"}</button>
                <button onClick={()=>removeMember(m.id)} style={{width:28,height:28,borderRadius:6,border:"none",background:"rgba(239,68,68,0.1)",color:"#ef4444",cursor:"pointer",fontSize:13}}>✕</button>
              </div>
            ))}
          </div>
        )}

        {/* ══ SQUAD ══ */}
        {tab==="squad"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div style={{fontSize:13,color:"#6b7280"}}>{(players||[]).length} players · {paidIds.size} paid</div>
              <button onClick={()=>setShowPForm(f=>!f)} style={{fontSize:11,padding:"6px 12px",borderRadius:7,border:`1px solid ${showPForm?"rgba(239,68,68,0.4)":"rgba(74,222,128,0.4)"}`,background:showPForm?"rgba(239,68,68,0.1)":"rgba(74,222,128,0.1)",color:showPForm?"#f87171":"#4ade80",cursor:"pointer",fontWeight:600}}>{showPForm?"✕ Cancel":"+ Add Player"}</button>
            </div>
            {showPForm&&(
              <div onClick={e=>e.stopPropagation()} style={{background:"rgba(74,222,128,0.05)",border:"1px solid rgba(74,222,128,0.2)",borderRadius:12,padding:14,marginBottom:14}}>
                <Lbl c="#4ade80">Add Player</Lbl>
                <div style={{display:"flex",gap:8,marginTop:6}}>
                  <input value={pName} onChange={e=>setPName(e.target.value)} placeholder="Player name" style={{...iS,flex:1}} onKeyDown={e=>e.key==="Enter"&&addPlayer()}/>
                  <button onClick={addPlayer} disabled={!pName.trim()} style={{padding:"9px 16px",borderRadius:8,border:"none",background:pName.trim()?"linear-gradient(135deg,#16a34a,#4ade80)":"rgba(255,255,255,0.05)",color:pName.trim()?"#0a0e1a":"#4b5563",fontWeight:800,cursor:pName.trim()?"pointer":"not-allowed"}}>Add</button>
                </div>
              </div>
            )}
            {(players||[]).filter(p=>p&&p.id).map(p=>{
              const paid=paidIds.has(p.id);const reg=isReg(p.name||"");
              const g=(goals||[]).filter(x=>x&&x.scorerName===p.name).length;
              const a=(goals||[]).filter(x=>x&&x.assistName===p.name).length;
              const isLate=lateIds.has(p.id);
              const currentSet=(playerSets||{})[p.id]!==undefined?(playerSets||{})[p.id]:"";
              return(
                <div key={p.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:10,marginBottom:7,background:paid?(reg?"rgba(167,139,250,0.07)":"rgba(74,222,128,0.06)"):"rgba(255,255,255,0.03)",border:`1px solid ${paid?(reg?"rgba(167,139,250,0.2)":"rgba(74,222,128,0.2)"):"rgba(255,255,255,0.06)"}`}}>
                  <div style={{width:34,height:34,borderRadius:"50%",background:reg?"linear-gradient(135deg,#6d28d9,#a78bfa)":paid?"rgba(74,222,128,0.2)":"rgba(255,255,255,0.08)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:14,color:reg?"#fff":paid?"#4ade80":"#6b7280",flexShrink:0}}>{(p.name||"?").charAt(0).toUpperCase()}</div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:14,color:"#fff",marginBottom:3}}>{p.name}</div>
                    <div style={{display:"flex",gap:4,alignItems:"center",flexWrap:"wrap"}}>
                      {paid?<span style={{fontSize:9,background:"rgba(74,222,128,0.15)",color:"#4ade80",borderRadius:4,padding:"1px 5px",fontWeight:700}}>✓ PAID</span>:<span style={{fontSize:9,background:"rgba(248,113,113,0.15)",color:"#f87171",borderRadius:4,padding:"1px 5px",fontWeight:700}}>UNPAID</span>}
                      {reg&&<span style={{fontSize:9,background:"rgba(167,139,250,0.2)",color:"#a78bfa",borderRadius:4,padding:"1px 5px",fontWeight:700}}>REG</span>}
                      {isLate&&<span style={{fontSize:9,background:"rgba(251,191,36,0.15)",color:"#fbbf24",borderRadius:4,padding:"1px 5px",fontWeight:700}}>LATE</span>}
                      {g>0&&<span style={{fontSize:10,color:"#60a5fa"}}>⚽{g}</span>}
                      {a>0&&<span style={{fontSize:10,color:"#a78bfa"}}>🅰{a}</span>}
                    </div>
                  </div>
                  <select value={currentSet} onChange={e=>{const val=e.target.value==="sub"?"sub":(Number(e.target.value)||"");setPlayerSets(ps=>({...ps,[p.id]:val}));}} style={{...sS,width:currentSet==="sub"?80:70,fontSize:11,padding:"5px 22px 5px 8px",backgroundColor:currentSet==="sub"?"rgba(251,146,60,0.15)":"#1a2235",borderColor:currentSet==="sub"?"rgba(251,146,60,0.4)":"rgba(255,255,255,0.12)",color:currentSet==="sub"?"#fb923c":"#fff"}}>
                    <option value="">Set?</option><option value="sub">🔄 SUB</option>
                    {setNumbers.slice(0,8).map(n=><option key={n} value={n}>Set {n}</option>)}
                  </select>
                  <button onClick={()=>removePlayer(p.id)} style={{width:28,height:28,borderRadius:6,border:"none",background:"rgba(239,68,68,0.1)",color:"#ef4444",cursor:"pointer",fontSize:13}}>✕</button>
                </div>
              );
            })}
          </div>
        )}

        {/* ══ MATCH ══ */}
        {tab==="match"&&(
          <div>
            {/* ── INTELLIGENT STATS TABLE ─────────────────────────────── */}
            {(()=>{
              // Build one row per unique player name from goals + cards
              const nameSet = new Set();
              (goals||[]).filter(g=>g).forEach(g=>{
                if(g.scorerName) nameSet.add(g.scorerName.trim());
                if(g.assistName) nameSet.add(g.assistName.trim());
              });
              (cards||[]).filter(c=>c).forEach(c=>{
                if(c.playerName) nameSet.add(c.playerName.trim());
              });

              if(nameSet.size===0) return(
                <div style={{textAlign:"center",padding:"32px 16px",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:14,marginBottom:16}}>
                  <div style={{fontSize:36,marginBottom:10}}>📊</div>
                  <div style={{fontSize:13,color:"#6b7280"}}>Stats will appear here as you log goals and cards below</div>
                </div>
              );

              const rows = Array.from(nameSet).map(name=>{
                const g  = (goals||[]).filter(x=>x&&x.scorerName&&x.scorerName.trim()===name).length;
                const a  = (goals||[]).filter(x=>x&&x.assistName&&x.assistName.trim()===name).length;
                const yCards = (cards||[]).filter(x=>x&&x.playerName&&x.playerName.trim()===name&&x.type==="yellow");
                const rCards = (cards||[]).filter(x=>x&&x.playerName&&x.playerName.trim()===name&&x.type==="red");
                const y  = yCards.length;
                const r  = rCards.length;
                const yOwed = yCards.filter(c=>!c.paid).length * CARD_FINE.yellow;
                const rOwed = rCards.filter(c=>!c.paid).length * CARD_FINE.red;
                const totalOwed = yOwed + rOwed;
                const allPaid = (y+r)>0 && totalOwed===0;
                return {name, g, a, y, r, totalOwed, allPaid, hasCards:(y+r)>0};
              }).sort((a,b)=>(b.g+b.a)-(a.g+a.a)||a.name.localeCompare(b.name));

              return(
                <div style={{marginBottom:20}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                    <div style={{fontSize:13,fontWeight:700,color:"#fff"}}>📊 Match Stats</div>
                    <div style={{display:"flex",gap:10,fontSize:11,color:"#6b7280"}}>
                      <span>⚽ {(goals||[]).length} goals</span>
                      <span>🃏 {(cards||[]).length} cards</span>
                    </div>
                  </div>

                  {/* Table */}
                  <div style={{borderRadius:14,border:"1px solid rgba(255,255,255,0.1)",overflow:"hidden"}}>
                    {/* Header */}
                    <div style={{display:"grid",gridTemplateColumns:"1fr 36px 36px 36px 36px 80px",background:"rgba(255,255,255,0.06)",padding:"9px 12px",gap:4,alignItems:"center"}}>
                      <div style={{fontSize:10,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",letterSpacing:"0.4px"}}>Player</div>
                      <div style={{fontSize:16,textAlign:"center"}} title="Goals">⚽</div>
                      <div style={{fontSize:16,textAlign:"center"}} title="Assists">🅰️</div>
                      <div style={{width:14,height:18,borderRadius:2,background:"#fbbf24",margin:"0 auto"}} title="Yellow cards"/>
                      <div style={{width:14,height:18,borderRadius:2,background:"#ef4444",margin:"0 auto"}} title="Red cards"/>
                      <div style={{fontSize:10,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",textAlign:"center"}}>Fines</div>
                    </div>

                    {/* Rows */}
                    {rows.map((row,i)=>(
                      <div key={row.name} style={{display:"grid",gridTemplateColumns:"1fr 36px 36px 36px 36px 80px",padding:"11px 12px",gap:4,alignItems:"center",background:i%2===0?"transparent":"rgba(255,255,255,0.02)",borderTop:"1px solid rgba(255,255,255,0.05)"}}>

                        {/* Name */}
                        <div style={{fontWeight:700,fontSize:13,color:"#e8eaf0",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{row.name}</div>

                        {/* Goals */}
                        <div style={{textAlign:"center"}}>
                          {row.g>0
                            ? <span style={{fontSize:13,fontWeight:800,color:"#60a5fa"}}>{row.g}</span>
                            : <span style={{fontSize:12,color:"#374151"}}>—</span>}
                        </div>

                        {/* Assists */}
                        <div style={{textAlign:"center"}}>
                          {row.a>0
                            ? <span style={{fontSize:13,fontWeight:800,color:"#a78bfa"}}>{row.a}</span>
